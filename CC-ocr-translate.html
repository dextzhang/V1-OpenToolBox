<!DOCTYPE html>
<html lang="zh-CN" data-page="cc-ocr-translate">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>截图OCR翻译工具</title>
        <link rel="stylesheet" href="cc-styles.css?v=2.2.0">
</head>
<body class="theme-dark">
  <div id="bg-layer"></div>
  <div id="app">
    <header class="header">
      <div class="header-left" style="display:flex;align-items:center;gap:12px;">
        <button class="theme-btn" onclick="goHome()" title="返回首页">🏠</button>
        <span class="logo">截图OCR翻译</span>
      </div>
      <div class="header-right">
        <button class="theme-btn" onclick="randomBg()" title="切换背景">🖼️</button>
        <div class="select-group">
          <span class="select-label">OCR</span>
          <select id="ocrEngine" class="engine-select">
            <option value="tesseract">Tesseract</option>
            <option value="ocrspace">OCR.space</option>
          </select>
        </div>
        <div class="select-group">
          <span class="select-label">翻译</span>
          <select id="transEngine" class="engine-select">
            <option value="google">Google</option>
            <option value="mymemory">MyMemory</option>
          </select>
        </div>
      </div>
    </header>

    <main class="main">
      <!-- Left: Screenshot Preview -->
      <div class="panel-left">
        <div class="flat-panel panel-top">
          <div class="panel-head">
            <span>截图预览</span>
            <span class="status">Ctrl+V 粘贴 / 点击上传</span>
          </div>
          <div class="panel-body" style="padding:14px;">
            <div id="preview" class="preview-area">
              <div class="placeholder-text">
                <div class="icon">🖼️</div>
                <p>点击或 Ctrl+V 粘贴截图</p>
              </div>
            </div>
          </div>
        </div>

        <div id="loadingArea" class="flat-panel" style="display:none; border-radius:0 0 var(--radius) var(--radius); margin-top:-1px;">
          <div class="loading">
            <div class="spinner"></div>
            <span id="progressText">正在识别...</span>
          </div>
        </div>
      </div>

      <!-- Right: Original & Translated (single connected panel) -->
      <div class="panel-right">
        <div class="flat-panel panel-top">
          <div class="panel-head">
            <span>原文</span>
            <div class="actions">
              <button class="btn btn-secondary" id="saveOriginalBtn" onclick="saveModifiedText()" style="display:none;">保存</button>
              <button class="btn btn-secondary" onclick="copyText('original')">复制</button>
            </div>
          </div>
          <div class="panel-body" style="padding:14px;">
            <textarea id="originalText" class="text-area" placeholder="识别的原文..."></textarea>
            <div id="wordCount" style="font-size:11px;color:var(--text-secondary);margin-top:8px;text-align:right;"></div>
          </div>
        </div>

        <div class="text-divider"></div>

        <div class="flat-panel panel-bottom">
          <div class="panel-head">
            <span>译文</span>
            <div class="actions">
              <button class="btn btn-warning" id="retranslateBtn" onclick="retranslate()" disabled>重新翻译</button>
              <button class="btn btn-secondary" onclick="copyText('translated')">复制</button>
            </div>
          </div>
          <div class="panel-body" style="padding:14px;">
            <textarea id="translatedText" class="text-area" readonly placeholder="翻译结果..."></textarea>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="select-group" style="display:flex;align-items:center;gap:8px;flex-wrap:nowrap;">
        <span class="select-label">源语言</span>
        <select id="sourceLang" class="lang-select">
          <option value="auto">自动</option>
          <option value="chs">中文</option>
          <option value="eng">英语</option>
          <option value="jpn">日语</option>
          <option value="kor">韩语</option>
          <option value="fra">法语</option>
          <option value="deu">德语</option>
          <option value="spa">西语</option>
          <option value="rus">俄语</option>
        </select>
        <span class="arrow-icon">→</span>
        <span class="select-label">目标语言</span>
        <select id="targetLang" class="lang-select">
          <option value="zh-CN">中文</option>
          <option value="en">英语</option>
          <option value="ja">日语</option>
          <option value="ko">韩语</option>
          <option value="fr">法语</option>
          <option value="de">德语</option>
          <option value="es">西语</option>
          <option value="ru">俄语</option>
        </select>
      </div>
      <div class="footer-actions">
        <button class="btn btn-secondary" id="exportBtn" onclick="exportText()" disabled>导出TXT</button>
        <button class="btn btn-secondary" onclick="clearHistory()">清空记录</button>
      </div>
      <span class="status" id="statusText">就绪</span>
    </footer>

    <!-- Recent History -->
    <div class="history-section">
      <div class="history-head">
        <span>最近记录 (最多10条)</span>
        <span class="status" id="historyCount"></span>
      </div>
      <div class="history-body" id="historyBody">
        <div class="no-history">暂无记录</div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" style="display:none;"></div>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script>
    function goHome() {
      window.location.href = 'index.html';
    }

    const bgApis = [
      'https://image.pollinations.ai/prompt/office-desk',
      'https://image.pollinations.ai/prompt/study-room',
      'https://image.pollinations.ai/prompt/cozy-reading',
      'https://image.pollinations.ai/prompt/library-books',
      'https://image.pollinations.ai/prompt/modern-workspace',
      'https://image.pollinations.ai/prompt/tech-desk',
      'https://image.pollinations.ai/prompt/productivity',
      'https://image.pollinations.ai/prompt/computer-setup'
    ];

    function randomBg() {
      const randomApi = bgApis[Math.floor(Math.random() * bgApis.length)];
      const timestamp = new Date().getTime();
      const url = `${randomApi}?t=${timestamp}`;
      document.getElementById('bg-layer').style.backgroundImage = `url('${url}')`;
      localStorage.setItem('toolBg', url);
    }

    function loadBg() {
      const saved = localStorage.getItem('toolBg');
      if (saved) { document.getElementById('bg-layer').style.backgroundImage = `url('${saved}')`; }
      else { randomBg(); }
    }

    const preview = document.getElementById('preview');
    const loadingArea = document.getElementById('loadingArea');
    const originalText = document.getElementById('originalText');
    const translatedText = document.getElementById('translatedText');
    const targetLang = document.getElementById('targetLang');
    const sourceLang = document.getElementById('sourceLang');
    const ocrEngine = document.getElementById('ocrEngine');
    const transEngine = document.getElementById('transEngine');
    const statusText = document.getElementById('statusText');
    const progressText = document.getElementById('progressText');
    const exportBtn = document.getElementById('exportBtn');
    const retranslateBtn = document.getElementById('retranslateBtn');
    const toast = document.getElementById('toast');
    const historyBody = document.getElementById('historyBody');
    const historyCount = document.getElementById('historyCount');
    const MAX_HISTORY = 10;
    const STORAGE_KEY = 'ocr_history';

    let currentImageData = null;
    let tesseractWorker = null;

    function showToast(msg) {
      toast.textContent = msg;
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 2500);
    }

    function copyText(type) {
      const text = type === 'original' ? originalText.value : translatedText.value;
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => showToast('已复制'));
    }

    function exportText() {
      if (!originalText.value) return;
      const content = `原文:\n${originalText.value}\n\n译文:\n${translatedText.value}`;
      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `翻译结果_${new Date().toLocaleString('zh-CN').replace(/[/:]/g, '-')}.txt`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('文件已下载');
    }

    function retranslate() {
      if (originalText.value) translateText(originalText.value);
    }

    // ── History ──
    function getHistory() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }

    function saveEntry(entry) {
      const list = getHistory();
      list.unshift(entry);
      if (list.length > MAX_HISTORY) list.length = MAX_HISTORY;
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }
      catch { /* storage full */ }
      renderHistory();
    }

    function renderHistory() {
      const list = getHistory();
      historyCount.textContent = list.length + ' 条';
      if (!list.length) {
        historyBody.innerHTML = '<div class="no-history">暂无记录</div>';
        return;
      }
      historyBody.innerHTML = list.map((item, i) => `
        <div class="history-item" onclick="loadHistoryItem(${i})">
          <button class="history-delete" onclick="event.stopPropagation();deleteHistoryItem(${i})" title="删除">✕</button>
          <div class="history-time">
            <span>${item.time}</span>
            <span class="lang-tag">${item.langs}</span>
          </div>
          <div class="history-text">
            <span class="orig-label">原文</span>
            <div class="orig-line">${escapeHtml(item.orig)}</div>
            <span class="trans-label">译文</span>
            <div class="trans-line">${escapeHtml(item.trans)}</div>
          </div>
        </div>
      `).join('');
    }

    function loadHistoryItem(index) {
      const item = getHistory()[index];
      if (!item) return;
      originalText.value = item.orig;
      translatedText.value = item.trans;
      updateWordCount();
      originalModified = false;
      document.getElementById('saveOriginalBtn').style.display = 'none';
      exportBtn.disabled = false;
      retranslateBtn.disabled = false;
      statusText.textContent = '已从历史记录加载';
    }

    function clearHistory() {
      if (!confirm('确定清空所有历史记录？')) return;
      localStorage.removeItem(STORAGE_KEY);
      renderHistory();
      showToast('已清空记录');
    }

    function deleteHistoryItem(index) {
      const list = getHistory();
      list.splice(index, 1);
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); } catch {}
      renderHistory();
    }

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    function formatTime(date) {
      const d = new Date(date);
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function getLangLabel(code) {
      const map = {
        'auto': '自动', 'chs': '中文', 'eng': '英语', 'jpn': '日语',
        'kor': '韩语', 'fra': '法语', 'deu': '德语', 'spa': '西语', 'rus': '俄语'
      };
      const tMap = {
        'zh-CN': '中文', 'en': '英语', 'ja': '日语', 'ko': '韩语',
        'fr': '法语', 'de': '德语', 'es': '西语', 'ru': '俄语'
      };
      if (tMap[code]) return tMap[code];
      return map[code] || code;
    }

    // Init
    renderHistory();

    // ── Original Text Edit Detection & Word Count ──
    let originalModified = false;
    let translateTimeout = null;

    originalText.addEventListener('input', () => {
      originalModified = true;
      document.getElementById('saveOriginalBtn').style.display = '';
      updateWordCount();
      if (translateTimeout) clearTimeout(translateTimeout);
      translateTimeout = setTimeout(() => {
        if (originalText.value.trim()) {
          translateText(originalText.value);
        }
      }, 800);
    });

    function saveModifiedText() {
      originalModified = false;
      document.getElementById('saveOriginalBtn').style.display = 'none';
      showToast('已保存修改');
    }

    function updateWordCount() {
      const text = originalText.value || '';
      const el = document.getElementById('wordCount');
      if (!text) {
        el.textContent = '';
        return;
      }
      const chars = text.length;
      const words = text.trim() ? text.trim().split(/\s+/).length : 0;
      const lines = text.split('\n').length;
      el.textContent = `${chars} 字符 · ${words} 词 · ${lines} 行`;
    }

    async function performOCR(imageData) {
      currentImageData = imageData;
      preview.innerHTML = `<img src="${imageData}" alt="截图" />`;
      preview.classList.add('has-image');
      loadingArea.style.display = 'flex';
      originalText.value = '';
      translatedText.value = '';
      originalModified = false;
      document.getElementById('saveOriginalBtn').style.display = 'none';
      exportBtn.disabled = true;
      retranslateBtn.disabled = true;
      statusText.textContent = '识别中...';
      progressText.textContent = '正在准备...';

      try {
        let text = '';
        if (ocrEngine.value === 'tesseract') {
          text = await ocrByTesseract(imageData);
        } else if (ocrEngine.value === 'ocrspace') {
          text = await ocrByOCRSpace(imageData);
        }

        loadingArea.style.display = 'none';

        if (text && text.trim()) {
          originalText.value = text.trim();
          statusText.textContent = '识别完成';
          updateWordCount();
          await translateText(text.trim());
          // Save to history after successful OCR + translation
          saveEntry({
            time: formatTime(Date.now()),
            langs: `${getLangLabel(sourceLang.value)} → ${getLangLabel(targetLang.value)}`,
            orig: text.trim(),
            trans: translatedText.value
          });
        } else {
          statusText.textContent = '未识别到文字';
          showToast('未识别到文字');
        }
      } catch (error) {
        console.error('OCR Error:', error);
        loadingArea.style.display = 'none';
        statusText.textContent = '识别失败';
        showToast(error.message || 'OCR识别失败');
      }
    }

    async function ocrByTesseract(imageData) {
      progressText.textContent = 'Tesseract 识别中...';
      const srcLang = sourceLang.value;
      const langMap = {
        'auto': 'eng+chi_sim+chi_tra',
        'chs': 'chi_sim',
        'eng': 'eng',
        'jpn': 'jpn',
        'kor': 'kor',
        'fra': 'fra',
        'deu': 'deu',
        'spa': 'spa',
        'rus': 'rus'
      };
      const tessLang = langMap[srcLang] || 'eng+chi_sim+chi_tra';

      if (!tesseractWorker) {
        progressText.textContent = '加载引擎...';
        tesseractWorker = await Tesseract.createWorker(tessLang, 1, {
          logger: m => {
            if (m.status === 'recognizing text') {
              progressText.textContent = `识别中 ${Math.round(m.progress * 100)}%`;
            }
          }
        });
      } else {
        await tesseractWorker.terminate();
        tesseractWorker = await Tesseract.createWorker(tessLang, 1, {
          logger: m => {
            if (m.status === 'recognizing text') {
              progressText.textContent = `识别中 ${Math.round(m.progress * 100)}%`;
            }
          }
        });
      }

      const { data: { text } } = await tesseractWorker.recognize(imageData);
      return text;
    }

    async function ocrByOCRSpace(imageData) {
      progressText.textContent = 'OCR.space 识别中...';
      const srcLang = sourceLang.value;
      const langMap = {
        'auto': 'chs', 'chs': 'chs', 'eng': 'eng', 'jpn': 'jpn',
        'kor': 'kor', 'fra': 'fre', 'deu': 'ger', 'spa': 'spa', 'rus': 'rus'
      };
      const apiLang = langMap[srcLang] || 'chs';

      const formData = new FormData();
      formData.append('apikey', 'helloworld');
      formData.append('language', apiLang);
      formData.append('isOverlayRequired', 'false');
      formData.append('base64Image', imageData);
      formData.append('detectOrientation', 'true');
      formData.append('scale', 'true');

      const response = await fetch('https://api.ocr.space/parse/image', {
        method: 'POST',
        body: formData
      });

      if (!response.ok) throw new Error(`API错误 ${response.status}`);

      const data = await response.json();
      if (data.IsErroredOnProcessing) throw new Error(data.ErrorMessage?.[0] || '识别失败');
      if (!data.ParsedResults || data.ParsedResults.length === 0) throw new Error('未识别到文字');

      return data.ParsedResults.map(r => r.ParsedText).join('');
    }

    async function translateText(text) {
      statusText.textContent = '翻译中...';
      const tl = targetLang.value;

      try {
        let translated = '';
        if (transEngine.value === 'google') {
          translated = await translateByGoogle(text, tl);
        } else if (transEngine.value === 'mymemory') {
          translated = await translateByMyMemory(text, tl);
        }

        translatedText.value = translated || '翻译结果为空';
        exportBtn.disabled = false;
        retranslateBtn.disabled = false;
        statusText.textContent = '完成';
        showToast('翻译完成');
      } catch (error) {
        console.error('Translation Error:', error);
        translatedText.value = '翻译失败: ' + (error.message || '请检查网络');
        statusText.textContent = '翻译失败';
        showToast('翻译失败');
      }
    }

    async function translateByGoogle(text, targetLang) {
      const langMap = {
        'zh-CN': 'zh', 'en': 'en', 'ja': 'ja', 'ko': 'ko',
        'fr': 'fr', 'de': 'de', 'es': 'es', 'ru': 'ru'
      };
      const tl = langMap[targetLang] || 'en';
      const sl = sourceLang.value === 'auto' ? 'auto' : (langMap[sourceLang.value] || 'auto');

      const response = await fetch(
        `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`
      );

      if (!response.ok) throw new Error(`翻译API错误 ${response.status}`);

      const data = await response.json();
      return data[0]?.map(item => item[0]).filter(Boolean).join('') || '';
    }

    async function translateByMyMemory(text, targetLang) {
      const langMap = {
        'zh-CN': 'zh-CN', 'en': 'en-US', 'ja': 'ja-JP', 'ko': 'ko-KR',
        'fr': 'fr-FR', 'de': 'de-DE', 'es': 'es-ES', 'ru': 'ru-RU'
      };
      const tl = langMap[targetLang] || 'zh-CN';
      const slMap = {
        'auto': 'auto', 'chs': 'zh-CN', 'eng': 'en-US', 'jpn': 'ja-JP',
        'kor': 'ko-KR', 'fra': 'fr-FR', 'deu': 'de-DE', 'spa': 'es-ES', 'rus': 'ru-RU'
      };
      const sl = sourceLang.value === 'auto' ? 'auto' : (slMap[sourceLang.value] || 'auto');

      const response = await fetch(
        `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sl}|${tl}`
      );

      if (!response.ok) throw new Error('MyMemory翻译失败');

      const data = await response.json();
      if (data.responseStatus !== 200) throw new Error(data.responseDetails || '翻译失败');

      return data.responseData.translatedText;
    }

    preview.addEventListener('click', () => {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = e => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = event => performOCR(event.target.result);
          reader.readAsDataURL(file);
        }
      };
      input.click();
    });

    document.addEventListener('paste', async e => {
      const items = e.clipboardData?.items;
      if (!items) return;

      for (const item of items) {
        if (item.type.startsWith('image/')) {
          e.preventDefault();
          const blob = item.getAsFile();
          const reader = new FileReader();
          reader.onload = event => performOCR(event.target.result);
          reader.readAsDataURL(blob);
          break;
        }
      }
    });

    targetLang.addEventListener('change', () => {
      if (originalText.value) translateText(originalText.value);
    });

    loadBg();
  </script>
    <script src="cc-common.js?v=2.1.8"></script>
</body>
</html>

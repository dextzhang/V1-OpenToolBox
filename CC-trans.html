<!doctype html>
<html lang="zh-CN" data-page="cc-trans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SnipTranslate 本地截图 OCR 翻译</title>
  <link rel="stylesheet" href="cc-styles.css?v=2.2.0">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
  <div id="bg-layer"></div>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">ST</div>
        <div>
          <h1>SnipTranslate</h1>
          <p>本地截图 OCR 翻译台</p>
        </div>
      </div>
      <div class="top-actions">
        <button class="icon-button" id="themeButton" type="button" title="切换配色">◐</button>
        <button class="icon-button" id="clearAllButton" type="button" title="清空当前内容">⌫</button>
      </div>
    </header>

    <main class="workspace">
      <section class="input-panel panel">
        <div class="panel-heading">
          <div>
            <h2>图片输入</h2>
            <p>粘贴截图、拖入图片，或点选文件</p>
          </div>
          <span class="status-pill" id="statusPill">就绪</span>
        </div>

        <button class="dropzone" id="dropzone" type="button">
          <span class="drop-icon">▣</span>
          <span class="drop-title">点击上传图片</span>
          <span class="drop-hint">支持 Ctrl+V、拖拽、PNG/JPG/WebP</span>
          <img id="previewImage" alt="截图预览">
        </button>
        <input id="fileInput" type="file" accept="image/*" hidden>

        <div class="progress-wrap" id="progressWrap" hidden>
          <div class="progress-meta">
            <span id="progressLabel">准备中...</span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="progress"><div id="progressBar"></div></div>
        </div>

        <div class="settings-grid">
          <label>
            OCR 引擎
            <select id="ocrEngine">
              <option value="tesseract">Tesseract 本地</option>
              <option value="ocrspace">OCR.space 云端</option>
            </select>
          </label>
          <label>
            翻译引擎
            <select id="translateEngine">
              <option value="google">Google 公共接口</option>
              <option value="mymemory">MyMemory</option>
            </select>
          </label>
          <label>
            源语言
            <select id="sourceLang">
              <option value="auto">自动检测</option>
              <option value="zh-CN">中文</option>
              <option value="en">英语</option>
              <option value="ja">日语</option>
              <option value="ko">韩语</option>
              <option value="fr">法语</option>
              <option value="de">德语</option>
              <option value="es">西班牙语</option>
              <option value="ru">俄语</option>
            </select>
          </label>
          <label>
            目标语言
            <select id="targetLang">
              <option value="zh-CN">中文</option>
              <option value="en">英语</option>
              <option value="ja">日语</option>
              <option value="ko">韩语</option>
              <option value="fr">法语</option>
              <option value="de">德语</option>
              <option value="es">西班牙语</option>
              <option value="ru">俄语</option>
            </select>
          </label>
        </div>
      </section>

      <section class="result-panel panel">
        <div class="panel-heading">
          <div>
            <h2>识别与翻译</h2>
            <p id="counterText">0 字符 · 0 行</p>
          </div>
          <div class="toolbar">
            <button id="ocrButton" type="button">识别图片</button>
            <button id="translateButton" class="primary" type="button">翻译文本</button>
          </div>
        </div>

        <div class="text-grid">
          <label class="text-box">
            <span>原文</span>
            <textarea id="sourceText" spellcheck="false" placeholder="OCR 结果会出现在这里，也可以直接粘贴文字后翻译。"></textarea>
            <button class="ghost-button" id="copySourceButton" type="button">复制原文</button>
          </label>
          <label class="text-box">
            <span>译文</span>
            <textarea id="targetText" spellcheck="false" placeholder="翻译结果会显示在这里。"></textarea>
            <button class="ghost-button" id="copyTargetButton" type="button">复制译文</button>
          </label>
        </div>
      </section>
    </main>

    <section class="history-panel panel">
      <div class="panel-heading">
        <div>
          <h2>历史记录</h2>
          <p>最近 20 条，本地浏览器保存</p>
        </div>
        <button class="danger-button" id="clearHistoryButton" type="button">清空历史</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </section>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="cc-common.js?v=2.1.8"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" data-page="cc-bookmark-manager-v2">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书签管理 - 超超工具箱</title>
    <link rel="stylesheet" href="cc-styles.css?v=2.2.0">
</head>
<body>
    <div id="bg-layer"></div>
    <button class="back-btn" onclick="goHome()">← 返回工具箱</button>

    <div class="header">
        <div class="bookmark-heading">
            <h1>📚 书签管理 V2</h1>
            <p>支持浏览器通用 HTML 书签导入导出</p>
        </div>
        <div class="header-actions bookmark-io-actions">
            <button class="btn-secondary" onclick="window.location.href='CC-browser.html'">🌐 浏览器</button>
            <button class="btn-secondary" onclick="showImportModal()">导入 HTML</button>
            <button class="btn-secondary" onclick="exportBookmarks()">导出 HTML</button>
            <button class="btn-primary" onclick="showAddBookmarkModal()">新建书签</button>
        </div>
        <div class="bookmark-command-bar">
            <div class="bookmark-search">
                <span>⌕</span>
                <input type="text" class="search-box" placeholder="搜索标题或网址..." id="searchInput" oninput="filterBookmarks()">
            </div>
            <select id="pageSizeSelect" onchange="changePageSize(this.value)" style="padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.5);color:#fff;font-size:0.9rem;cursor:pointer;">
                <option value="50" selected>50条/页</option>
                <option value="100">100条/页</option>
                <option value="200">200条/页</option>
                <option value="300">300条/页</option>
            </select>
            <select id="bookmarkOpenMode" onchange="localStorage.setItem('cc_browser_open_mode', this.value)" style="padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.5);color:#fff;font-size:0.9rem;cursor:pointer;">
                <option value="internal">内部打开</option>
                <option value="window">新窗口打开</option>
            </select>
            <button class="btn-secondary folder-create-btn" onclick="showAddFolderModal()">新建文件夹</button>
        </div>
    </div>

    <div class="container">
        <div class="sidebar">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
                <h3>📁 文件夹</h3>
                <div style="display:flex;gap:5px;">
                    <button class="btn-secondary" style="padding:5px 10px;font-size:0.8rem;" onclick="toggleFolderSelectMode()" id="folderSelectModeBtn">☑️</button>
                    <button class="btn-secondary" style="padding:5px 10px;font-size:0.8rem;" onclick="showAddFolderModal()">➕</button>
                </div>
            </div>
            <div class="bookmark-search" style="margin-bottom:10px;">
                <span>⌕</span>
                <input type="text" class="search-box" placeholder="搜索文件夹..." id="folderSearchInput" oninput="filterFolders()">
            </div>
            <div id="folderList"></div>
            <div id="folderBatchActions" style="display:none;margin-top:10px;">
                <button class="btn-secondary" onclick="toggleSelectAllFolders()">☑️ 全选/取消</button>
                <button class="btn-secondary" onclick="deleteSelectedFolders()">🗑️ 删除选中</button>
                <button class="btn-secondary" onclick="cancelFolderSelection()">取消选择</button>
            </div>
        </div>

        <div class="main-content">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                <div style="display:flex;gap:10px;">
                    <button class="btn-secondary" onclick="toggleBookmarkSelectMode()" id="bookmarkSelectModeBtn">☑️ 多选操作</button>
                </div>
                <div id="bookmarkBatchActions" style="display:none;">
                    <button class="btn-secondary" onclick="clearAllBookmarks()" id="clearAllBtn">🗑️ 清空全部</button>
                    <button class="btn-secondary" onclick="toggleSelectAllBookmarks()">☑️ 全选/取消</button>
                    <button class="btn-secondary" onclick="deleteSelectedBookmarks()">🗑️ 删除选中</button>
                    <button class="btn-secondary" onclick="cancelBookmarkSelection()">取消选择</button>
                </div>
            </div>
            <div id="bookmarkList"></div>
        </div>
    </div>

    <!-- 书签弹窗 -->
    <div class="modal-overlay" id="bookmarkModal">
        <div class="modal">
            <h2 id="modalTitle">添加书签</h2>
            <div class="form-group">
                <label>标题</label>
                <input type="text" id="bookmarkTitle" placeholder="书签名称">
            </div>
            <div class="form-group">
                <label>网址 (URL)</label>
                <input type="text" id="bookmarkUrl" placeholder="example.com (自动补全http://)">
            </div>
            <div class="form-group">
                <label>文件夹</label>
                <select id="bookmarkFolder"></select>
            </div>
            <div class="form-group">
                <label>选择图标</label>
                <div class="icon-picker" id="bookmarkIconPicker">
                    <button type="button" onclick="selectBookmarkIcon(this, '🔗')">🔗</button>
                    <button type="button" onclick="selectBookmarkIcon(this, '🌐')">🌐</button>
                    <button type="button" onclick="selectBookmarkIcon(this, '📄')">📄</button>
                    <button type="button" onclick="selectBookmarkIcon(this, '📝')">📝</button>
                    <button type="button" onclick="selectBookmarkIcon(this, '💼')">💼</button>
                    <button type="button" onclick="selectBookmarkIcon(this, '💻')">💻</button>
                    <button type="button" onclick="selectBookmarkIcon(this, '📱')">📱</button>
                    <button type="button" onclick="selectBookmarkIcon(this, '🎮')">🎮</button>
                    <button type="button" onclick="selectBookmarkIcon(this, '🎬')">🎬</button>
                    <button type="button" onclick="selectBookmarkIcon(this, '🎵')">🎵</button>
                    <button type="button" onclick="selectBookmarkIcon(this, '📖')">📖</button>
                    <button type="button" onclick="selectBookmarkIcon(this, '🔍')">🔍</button>
                    <button type="button" onclick="selectBookmarkIcon(this, '🛒')">🛒</button>
                    <button type="button" onclick="selectBookmarkIcon(this, '💰')">💰</button>
                    <button type="button" onclick="selectBookmarkIcon(this, '⚙️')">⚙️</button>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeModal('bookmarkModal')">取消</button>
                <button class="btn-primary" onclick="saveBookmark()">保存</button>
            </div>
        </div>
    </div>

    <!-- 文件夹弹窗 -->
    <div class="modal-overlay" id="folderModal">
        <div class="modal">
            <h2 id="folderModalTitle">新建文件夹</h2>
            <div class="form-group">
                <label>文件夹名称</label>
                <input type="text" id="folderName" placeholder="文件夹名称">
            </div>
            <div class="form-group">
                <label>上级文件夹</label>
                <select id="folderParent"></select>
            </div>
            <div class="form-group">
                <label>选择图标</label>
                <div class="icon-picker" id="folderIconPicker">
                    <button type="button" onclick="selectFolderIcon(this, '📁')">📁</button>
                    <button type="button" onclick="selectFolderIcon(this, '💼')">💼</button>
                    <button type="button" onclick="selectFolderIcon(this, '💻')">💻</button>
                    <button type="button" onclick="selectFolderIcon(this, '🏠')">🏠</button>
                    <button type="button" onclick="selectFolderIcon(this, '📚')">📚</button>
                    <button type="button" onclick="selectFolderIcon(this, '🎮')">🎮</button>
                    <button type="button" onclick="selectFolderIcon(this, '🎬')">🎬</button>
                    <button type="button" onclick="selectFolderIcon(this, '🎵')">🎵</button>
                    <button type="button" onclick="selectFolderIcon(this, '🛒')">🛒</button>
                    <button type="button" onclick="selectFolderIcon(this, '💳')">💳</button>
                    <button type="button" onclick="selectFolderIcon(this, '🔧')">🔧</button>
                    <button type="button" onclick="selectFolderIcon(this, '⚙️')">⚙️</button>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeModal('folderModal')">取消</button>
                <button class="btn-primary" onclick="saveFolder()">保存</button>
            </div>
        </div>
    </div>

    <!-- 导入弹窗 -->
    <div class="modal-overlay" id="importModal">
        <div class="modal">
            <h2>导入书签</h2>
            <div class="form-group">
                <label>选择浏览器书签 HTML 文件</label>
                <input type="file" id="importFile" accept=".html,.htm,.json" onchange="handleImport(event)">
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeModal('importModal')">取消</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <style>
        .folder-item.selected,
        .bookmark-item.selected {
            background: rgba(102, 126, 234, 0.3) !important;
            border: 1px solid #667eea !important;
        }

        .folder-item {
            padding-left: calc(12px + var(--folder-depth, 0) * 20px) !important;
            cursor: grab;
        }

        .folder-item.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .folder-item.drag-over {
            border-top: 2px solid #667eea !important;
        }

        .folder-toggle {
            user-select: none;
        }

        #folderSelectModeBtn.selected,
        #bookmarkSelectModeBtn.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
        }

        /* 页面宽度调整为85% */
        html[data-page="cc-bookmark-manager-v2"] .container {
            width: 85%;
            margin: 0 auto;
        }

        html[data-page="cc-bookmark-manager-v2"] .header {
            width: 85%;
            margin: 0 auto 20px auto;
        }

        html[data-page="cc-bookmark-manager-v2"] body {
            padding-left: 0;
            padding-right: 0;
        }
    </style>

    <script>
        // ========== 数据初始化 ==========
        let bookmarks = [];
        let folders = [];
        let currentFolder = 'all';
        let editingBookmarkId = null;
        let editingFolderId = null;
        let selectedFolderIcon = '📁';
        let selectedBookmarkIcon = '🔗';
        let currentPage = 1;
        let pageSize = parseInt(localStorage.getItem('bookmarkPageSize')) || 50;
        let folderSelectMode = false;
        let bookmarkSelectMode = false;
        let selectedFolderIds = new Set();
        let selectedBookmarkIds = new Set();
        let expandedFolders = new Set();
        let draggedFolderId = null;

        // ========== 背景管理 ==========
        const bgApis = [
            'https://image.pollinations.ai/prompt/library-books',
            'https://image.pollinations.ai/prompt/study-room',
            'https://image.pollinations.ai/prompt/cozy-reading',
            'https://image.pollinations.ai/prompt/office-desk'
        ];

        function loadBg() {
            const saved = localStorage.getItem('toolBg');
            if (saved) {
                document.getElementById('bg-layer').style.backgroundImage = `url('${saved}')`;
            } else {
                randomBg();
            }
        }

        function randomBg() {
            const randomApi = bgApis[Math.floor(Math.random() * bgApis.length)];
            const timestamp = new Date().getTime();
            const url = `${randomApi}?t=${timestamp}`;
            document.getElementById('bg-layer').style.backgroundImage = `url('${url}')`;
            localStorage.setItem('toolBg', url);
        }

        function goHome() {
            window.location.href = 'index.html';
        }

        // ========== 数据加载与保存 ==========
        function loadData() {
            const savedBookmarks = localStorage.getItem('bookmarks');
            const savedFolders = localStorage.getItem('bookmarkFolders');

            bookmarks = savedBookmarks ? JSON.parse(savedBookmarks) : getDefaultBookmarks();
            folders = savedFolders ? JSON.parse(savedFolders) : [];

            // 把所有书签图标更新为默认图标
            let needSave = false;
            bookmarks.forEach(bookmark => {
                if (bookmark.icon !== '🔗') {
                    bookmark.icon = '🔗';
                    needSave = true;
                }
            });
            if (needSave) {
                saveData();
            }

            if (folders.length === 0) {
                folders = [
                    { id: 'work', name: '工作', icon: '💼' },
                    { id: 'tech', name: '技术', icon: '💻' },
                    { id: 'life', name: '生活', icon: '🏠' }
                ];
                saveData();
            }

            document.getElementById('bookmarkOpenMode').value = localStorage.getItem('cc_browser_open_mode') || 'internal';
            renderFolders();
            renderBookmarks();
        }

        function getDefaultBookmarks() {
            return [
                { id: 1, title: 'Google', url: 'https://google.com', folder: 'tech', icon: '🔗' },
                { id: 2, title: 'GitHub', url: 'https://github.com', folder: 'tech', icon: '🔗' },
                { id: 3, title: '知乎', url: 'https://zhihu.com', folder: 'life', icon: '🔗' }
            ];
        }

        function saveData() {
            localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
            localStorage.setItem('bookmarkFolders', JSON.stringify(folders));
        }

        function getFolderDepth(folderId, guard = new Set()) {
            const folder = folders.find(f => f.id === folderId);
            if (!folder || !folder.parentId || guard.has(folderId)) return 0;
            guard.add(folderId);
            return 1 + getFolderDepth(folder.parentId, guard);
        }

        function getDescendantFolderIds(folderId) {
            const ids = new Set([folderId]);
            let changed = true;
            while (changed) {
                changed = false;
                folders.forEach(folder => {
                    if (folder.parentId && ids.has(folder.parentId) && !ids.has(folder.id)) {
                        ids.add(folder.id);
                        changed = true;
                    }
                });
            }
            return ids;
        }

        function getFolderBookmarkCount(folderId) {
            const ids = getDescendantFolderIds(folderId);
            return bookmarks.filter(b => ids.has(b.folder)).length;
        }

        function getSortedFolders() {
            const result = [];
            const visited = new Set();
            const walk = parentId => {
                folders
                    .filter(folder => (folder.parentId || '') === (parentId || ''))
                    .forEach(folder => {
                        if (visited.has(folder.id)) return;
                        visited.add(folder.id);
                        result.push(folder);
                        walk(folder.id);
                    });
            };
            walk('');
            folders.forEach(folder => {
                if (!visited.has(folder.id)) result.push(folder);
            });
            return result;
        }

        function renderFolderOptions(selectedId = '', excludeId = '') {
            const blocked = excludeId ? getDescendantFolderIds(excludeId) : new Set();
            const options = ['<option value="">未分类 / 顶层</option>'];
            getSortedFolders().forEach(folder => {
                if (folder.id === excludeId || blocked.has(folder.id)) return;
                const depth = getFolderDepth(folder.id);
                const prefix = depth ? `${'　'.repeat(depth)}└ ` : '';
                options.push(`<option value="${folder.id}" ${folder.id === selectedId ? 'selected' : ''}>${prefix}${folder.icon || '📁'} ${escapeHtml(folder.name)}</option>`);
            });
            return options.join('');
        }

        // ========== 渲染文件夹列表 ==========
        function renderFolders(filterText = '') {
            const folderList = document.getElementById('folderList');

            let html = `
                <div class="folder-item ${currentFolder === 'all' ? 'active' : ''}" data-folder="all" onclick="selectFolder('all')">
                    <span style="width:20px;"></span>
                    <span class="folder-icon">🌐</span>
                    <span class="folder-name">全部书签</span>
                    <span class="folder-count">${bookmarks.length}</span>
                </div>
            `;

            html += renderFolderTree('', filterText, 0);

            folderList.innerHTML = html;
        }

        // ========== 递归渲染文件夹树 ==========
        function renderFolderTree(parentId = '', filterText = '', level = 0) {
            let html = '';
            const children = folders.filter(f => (f.parentId || '') === parentId);

            let filteredChildren = children;
            if (filterText) {
                const text = filterText.toLowerCase();
                filteredChildren = children.filter(folder =>
                    folder.name.toLowerCase().includes(text)
                );
            }

            filteredChildren.forEach(folder => {
                const count = getFolderBookmarkCount(folder.id);
                const isSelected = selectedFolderIds.has(folder.id);
                const isExpanded = expandedFolders.has(folder.id);
                const hasChildren = folders.some(f => (f.parentId || '') === folder.id);

                html += `
                    <div class="folder-item ${currentFolder === folder.id ? 'active' : ''} ${isSelected ? 'selected' : ''}"
                         data-folder="${folder.id}"
                         data-folder-id="${folder.id}"
                         data-parent-id="${parentId}"
                         draggable="true"
                         style="--folder-depth:${level}"
                         onclick="handleFolderClick('${folder.id}', event)"
                         ondragstart="folderDragStart(event, '${folder.id}')"
                         ondragend="folderDragEnd(event)"
                         ondragover="folderDragOver(event)"
                         ondragleave="folderDragLeave(event)"
                         ondrop="folderDrop(event, '${folder.id}')">
                        ${folderSelectMode ? `<input type="checkbox" ${isSelected ? 'checked' : ''}" onclick="event.stopPropagation(); toggleFolderSelection('${folder.id}')" style="margin-right:8px;cursor:pointer;">` : ''}
                        ${hasChildren ? `
                            <span class="folder-toggle" onclick="event.stopPropagation(); toggleFolderExpand('${folder.id}')" style="cursor:pointer;width:20px;text-align:center;font-size:0.8rem;">
                                ${isExpanded ? '▼' : '▶'}
                            </span>
                        ` : `<span style="width:20px;"></span>`}
                        <span class="folder-icon">${folder.icon || '📁'}</span>
                        <span class="folder-name">${folder.name}</span>
                        <span class="folder-count">${count}</span>
                        ${!folderSelectMode ? `
                        <div class="folder-actions">
                            <button onclick="event.stopPropagation(); editFolder('${folder.id}')">✏️</button>
                            <button onclick="event.stopPropagation(); deleteFolder('${folder.id}')">🗑️</button>
                        </div>
                        ` : ''}
                    </div>
                `;

                if (isExpanded && hasChildren) {
                    html += renderFolderTree(folder.id, filterText, level + 1);
                }
            });

            return html;
        }

        // ========== 切换文件夹展开/收缩 ==========
        function toggleFolderExpand(folderId) {
            if (expandedFolders.has(folderId)) {
                expandedFolders.delete(folderId);
            } else {
                expandedFolders.add(folderId);
            }
            renderFolders(document.getElementById('folderSearchInput').value);
        }

        // ========== 文件夹拖动排序 ==========
        function folderDragStart(event, folderId) {
            draggedFolderId = folderId;
            event.dataTransfer.effectAllowed = 'move';
            event.target.classList.add('dragging');
            event.stopPropagation();
        }

        function folderDragEnd(event) {
            event.target.classList.remove('dragging');
            document.querySelectorAll('.folder-item').forEach(item => {
                item.classList.remove('drag-over');
            });
            draggedFolderId = null;
        }

        function folderDragOver(event) {
            event.preventDefault();
            event.dataTransfer.dropEffect = 'move';
            const folderItem = event.target.closest('.folder-item');
            if (folderItem && folderItem.dataset.folderId !== draggedFolderId) {
                document.querySelectorAll('.folder-item').forEach(item => {
                    item.classList.remove('drag-over');
                });
                folderItem.classList.add('drag-over');
            }
        }

        function folderDragLeave(event) {
            const folderItem = event.target.closest('.folder-item');
            if (folderItem) {
                folderItem.classList.remove('drag-over');
            }
        }

        function folderDrop(event, targetFolderId) {
            event.preventDefault();
            event.stopPropagation();

            if (!draggedFolderId || draggedFolderId === targetFolderId) {
                return;
            }

            // 检查是否是目标文件夹的后代文件夹
            const descendantIds = getDescendantFolderIds(draggedFolderId);
            if (descendantIds.has(targetFolderId)) {
                showToast('不能把文件夹移动到其子文件夹中');
                return;
            }

            // 获取拖动文件夹和目标文件夹
            const draggedFolder = folders.find(f => f.id === draggedFolderId);
            const targetFolder = folders.find(f => f.id === targetFolderId);

            if (!draggedFolder || !targetFolder) {
                return;
            }

            // 把拖动的文件夹移动到目标文件夹的同一级，放在目标文件夹后面
            const oldParentId = draggedFolder.parentId || '';
            const newParentId = targetFolder.parentId || '';

            // 更新拖动文件夹的父文件夹
            draggedFolder.parentId = newParentId;

            // 重新排序数组
            const otherFolders = folders.filter(f => f.id !== draggedFolderId);
            const targetIndex = otherFolders.findIndex(f => f.id === targetFolderId);

            if (targetIndex !== -1) {
                otherFolders.splice(targetIndex + 1, 0, draggedFolder);
                folders = otherFolders;
            }

            saveData();
            renderFolders(document.getElementById('folderSearchInput').value);
            showToast('文件夹已移动');
        }

        // ========== 全选/取消全选文件夹 ==========
        function toggleSelectAllFolders() {
            let filteredFolders = getSortedFolders();
            const filterText = document.getElementById('folderSearchInput').value;
            if (filterText) {
                const text = filterText.toLowerCase();
                filteredFolders = filteredFolders.filter(folder =>
                    folder.name.toLowerCase().includes(text)
                );
            }

            const allSelected = filteredFolders.every(f => selectedFolderIds.has(f.id));
            if (allSelected) {
                filteredFolders.forEach(f => selectedFolderIds.delete(f.id));
            } else {
                filteredFolders.forEach(f => selectedFolderIds.add(f.id));
            }
            renderFolders(filterText);
        }

        // ========== 全选/取消全选书签 ==========
        function toggleSelectAllBookmarks() {
            let filtered = bookmarks;
            if (currentFolder !== 'all') {
                const folderIds = getDescendantFolderIds(currentFolder);
                filtered = filtered.filter(b => folderIds.has(b.folder));
            }
            const filterText = document.getElementById('searchInput').value;
            if (filterText) {
                const text = filterText.toLowerCase();
                filtered = filtered.filter(b =>
                    b.title.toLowerCase().includes(text) ||
                    b.url.toLowerCase().includes(text)
                );
            }

            const allSelected = filtered.every(b => selectedBookmarkIds.has(b.id));
            if (allSelected) {
                filtered.forEach(b => selectedBookmarkIds.delete(b.id));
            } else {
                filtered.forEach(b => selectedBookmarkIds.add(b.id));
            }
            renderBookmarks(filterText);
        }

        // ========== 文件夹搜索 ==========
        function filterFolders() {
            const searchText = document.getElementById('folderSearchInput').value;
            renderFolders(searchText);
        }

        // ========== 文件夹选择模式 ==========
        function toggleFolderSelectMode() {
            folderSelectMode = !folderSelectMode;
            selectedFolderIds.clear();
            const btn = document.getElementById('folderSelectModeBtn');
            const batchActions = document.getElementById('folderBatchActions');
            if (folderSelectMode) {
                btn.classList.add('selected');
                btn.textContent = '✓';
                batchActions.style.display = 'flex';
                batchActions.style.gap = '10px';
            } else {
                btn.classList.remove('selected');
                btn.textContent = '☑️';
                batchActions.style.display = 'none';
            }
            renderFolders(document.getElementById('folderSearchInput').value);
        }

        function handleFolderClick(folderId, event) {
            if (folderSelectMode) {
                toggleFolderSelection(folderId);
            } else {
                selectFolder(folderId);
            }
        }

        function toggleFolderSelection(folderId) {
            if (selectedFolderIds.has(folderId)) {
                selectedFolderIds.delete(folderId);
            } else {
                selectedFolderIds.add(folderId);
            }
            renderFolders(document.getElementById('folderSearchInput').value);
        }

        function cancelFolderSelection() {
            folderSelectMode = false;
            selectedFolderIds.clear();
            const btn = document.getElementById('folderSelectModeBtn');
            const batchActions = document.getElementById('folderBatchActions');
            btn.classList.remove('selected');
            btn.textContent = '☑️';
            batchActions.style.display = 'none';
            renderFolders(document.getElementById('folderSearchInput').value);
        }

        function deleteSelectedFolders() {
            if (selectedFolderIds.size === 0) {
                showToast('请先选择要删除的文件夹');
                return;
            }
            if (!confirm(`确定要删除选中的 ${selectedFolderIds.size} 个文件夹吗？其中的书签将变为"未分类"。`)) return;

            let allDeletedIds = new Set();
            selectedFolderIds.forEach(id => {
                getDescendantFolderIds(id).forEach(did => allDeletedIds.add(did));
            });

            bookmarks.forEach(b => {
                if (allDeletedIds.has(b.folder)) b.folder = '';
            });
            folders = folders.filter(f => !allDeletedIds.has(f.id));
            saveData();

            if (selectedFolderIds.has(currentFolder)) currentFolder = 'all';
            cancelFolderSelection();
            renderFolders();
            renderBookmarks();
            showToast(`已删除 ${allDeletedIds.size} 个文件夹`);
        }

        // ========== 渲染书签列表 ==========
        function renderBookmarks(filterText = '', newBookmarkId = null) {
            const list = document.getElementById('bookmarkList');
            const clearAllBtn = document.getElementById('clearAllBtn');
            let filtered = bookmarks;

            if (currentFolder !== 'all') {
                const folderIds = getDescendantFolderIds(currentFolder);
                filtered = filtered.filter(b => folderIds.has(b.folder));
            }

            if (filterText) {
                const text = filterText.toLowerCase();
                filtered = filtered.filter(b =>
                    b.title.toLowerCase().includes(text) ||
                    b.url.toLowerCase().includes(text)
                );
            }

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>${filterText ? '没有找到匹配的书签' : '暂无书签'}</p>
                        <p style="margin-top:10px;font-size:0.9rem;">点击右上角"新建书签"添加</p>
                    </div>
                `;
                return;
            }

            const totalPages = Math.ceil(filtered.length / pageSize);
            if (currentPage > totalPages) currentPage = 1;

            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const pageItems = filtered.slice(startIndex, endIndex);

            let html = '';
            pageItems.forEach(bookmark => {
                const isNew = bookmark.id === newBookmarkId;
                const isSelected = selectedBookmarkIds.has(bookmark.id);
                html += `
                    <div class="bookmark-item ${isNew ? 'new-item' : ''} ${isSelected ? 'selected' : ''}" data-bookmark-id="${bookmark.id}" onclick="handleBookmarkClick(${bookmark.id}, event)">
                        ${bookmarkSelectMode ? `<input type="checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation(); toggleBookmarkSelection(${bookmark.id})" style="margin-right:8px;cursor:pointer;">` : ''}
                        <div class="bookmark-icon">${bookmark.icon || '🔗'}</div>
                        <div class="bookmark-info">
                            <div class="bookmark-title">${escapeHtml(bookmark.title)}</div>
                            <div class="bookmark-url">${escapeHtml(bookmark.url)}</div>
                        </div>
                        ${!bookmarkSelectMode ? `
                        <div class="bookmark-actions">
                            <button class="open-btn" onclick="event.stopPropagation(); openBookmark('${escapeHtml(bookmark.url)}')">打开</button>
                            <button onclick="event.stopPropagation(); copyBookmarkUrl('${escapeHtml(bookmark.url)}')">📋 复制</button>
                            <button onclick="event.stopPropagation(); editBookmark(${bookmark.id})">编辑</button>
                            <button onclick="event.stopPropagation(); deleteBookmark(${bookmark.id})">删除</button>
                        </div>
                        ` : ''}
                    </div>
                `;
            });

            html += renderPagination(filtered.length, totalPages);
            list.innerHTML = html;
        }

        // ========== 书签选择模式 ==========
        function toggleBookmarkSelectMode() {
            bookmarkSelectMode = !bookmarkSelectMode;
            selectedBookmarkIds.clear();
            const btn = document.getElementById('bookmarkSelectModeBtn');
            const batchActions = document.getElementById('bookmarkBatchActions');
            const clearAllBtn = document.getElementById('clearAllBtn');
            if (bookmarkSelectMode) {
                btn.classList.add('selected');
                btn.textContent = '✓ 取消';
                batchActions.style.display = 'flex';
                batchActions.style.gap = '10px';
                // 清空全部按钮的显示由 renderBookmarks 函数统一控制
            } else {
                btn.classList.remove('selected');
                btn.textContent = '☑️ 多选操作';
                batchActions.style.display = 'none';
            }
            renderBookmarks(document.getElementById('searchInput').value);
        }

        function handleBookmarkClick(bookmarkId, event) {
            if (bookmarkSelectMode) {
                toggleBookmarkSelection(bookmarkId);
            }
        }

        function toggleBookmarkSelection(bookmarkId) {
            if (selectedBookmarkIds.has(bookmarkId)) {
                selectedBookmarkIds.delete(bookmarkId);
            } else {
                selectedBookmarkIds.add(bookmarkId);
            }
            renderBookmarks(document.getElementById('searchInput').value);
        }

        function cancelBookmarkSelection() {
            bookmarkSelectMode = false;
            selectedBookmarkIds.clear();
            const btn = document.getElementById('bookmarkSelectModeBtn');
            const batchActions = document.getElementById('bookmarkBatchActions');
            const clearAllBtn = document.getElementById('clearAllBtn');
            btn.classList.remove('selected');
            btn.textContent = '☑️ 多选';
            batchActions.style.display = 'none';
            renderBookmarks(document.getElementById('searchInput').value);
        }

        function deleteSelectedBookmarks() {
            if (selectedBookmarkIds.size === 0) {
                showToast('请先选择要删除的书签');
                return;
            }
            if (!confirm(`确定要删除选中的 ${selectedBookmarkIds.size} 个书签吗？`)) return;

            bookmarks = bookmarks.filter(b => !selectedBookmarkIds.has(b.id));
            saveData();
            cancelBookmarkSelection();
            renderFolders();
            renderBookmarks();
            showToast(`已删除 ${selectedBookmarkIds.size} 个书签`);
        }

        function clearAllBookmarks() {
            if (!confirm('确定要清空所有书签吗？此操作不可恢复！')) return;
            bookmarks = [];
            saveData();
            renderFolders();
            renderBookmarks();
            showToast('所有书签已清空');
        }

        function renderPagination(total, totalPages) {
            if (totalPages <= 1) return '';
            return `
                <div class="pagination" style="display:flex;justify-content:center;align-items:center;gap:10px;padding:20px;">
                    <button class="btn-secondary" onclick="goToPage(1)" ${currentPage === 1 ? 'disabled' : ''}>首页</button>
                    <button class="btn-secondary" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>
                    <span style="color:#fff;">第 ${currentPage} / ${totalPages} 页</span>
                    <span style="color:rgba(255,255,255,0.6);">(共 ${total} 条)</span>
                    <button class="btn-secondary" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>
                    <button class="btn-secondary" onclick="goToPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>尾页</button>
                </div>
            `;
        }

        function goToPage(page) {
            const list = document.getElementById('bookmarkList');
            let filtered = bookmarks;
            if (currentFolder !== 'all') {
                const folderIds = getDescendantFolderIds(currentFolder);
                filtered = filtered.filter(b => folderIds.has(b.folder));
            }
            const filterText = document.getElementById('searchInput').value;
            if (filterText) {
                const text = filterText.toLowerCase();
                filtered = filtered.filter(b =>
                    b.title.toLowerCase().includes(text) ||
                    b.url.toLowerCase().includes(text)
                );
            }
            const totalPages = Math.ceil(filtered.length / pageSize);
            if (page < 1) page = 1;
            if (page > totalPages) page = totalPages;
            currentPage = page;
            renderBookmarks(filterText);
        }

        function changePageSize(size) {
            pageSize = parseInt(size);
            localStorage.setItem('bookmarkPageSize', pageSize);
            currentPage = 1;
            renderBookmarks(document.getElementById('searchInput').value);
        }

        // ========== 文件夹操作 ==========
        function selectFolder(folderId) {
            currentFolder = folderId;
            currentPage = 1;
            renderFolders();
            renderBookmarks(document.getElementById('searchInput').value);
        }

        function filterBookmarks() {
            const searchText = document.getElementById('searchInput').value;
            renderBookmarks(searchText);
        }

        function showAddFolderModal() {
            editingFolderId = null;
            document.getElementById('folderModalTitle').textContent = '新建文件夹';
            document.getElementById('folderName').value = '';
            document.getElementById('folderParent').innerHTML = renderFolderOptions('', '');
            selectedFolderIcon = '📁';
            document.querySelectorAll('#folderIconPicker button').forEach(btn => btn.classList.remove('selected'));
            document.querySelector('#folderIconPicker button:first-child').classList.add('selected');
            document.getElementById('folderModal').classList.add('show');
        }

        function selectFolderIcon(btn, icon) {
            document.querySelectorAll('#folderIconPicker button').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedFolderIcon = icon;
        }

        function selectBookmarkIcon(btn, icon) {
            document.querySelectorAll('#bookmarkIconPicker button').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedBookmarkIcon = icon;
        }

        function editFolder(id) {
            const folder = folders.find(f => f.id === id);
            if (!folder) return;

            editingFolderId = id;
            document.getElementById('folderModalTitle').textContent = '编辑文件夹';
            document.getElementById('folderName').value = folder.name;
            document.getElementById('folderParent').innerHTML = renderFolderOptions(folder.parentId || '', id);
            selectedFolderIcon = folder.icon || '📁';

            document.querySelectorAll('#folderIconPicker button').forEach(btn => {
                btn.classList.remove('selected');
                if (btn.textContent === selectedFolderIcon) {
                    btn.classList.add('selected');
                }
            });

            document.getElementById('folderModal').classList.add('show');
        }

        function saveFolder() {
            const name = document.getElementById('folderName').value.trim();
            const parentId = document.getElementById('folderParent').value;
            if (!name) {
                showToast('请填写文件夹名称');
                return;
            }

            if (editingFolderId) {
                const index = folders.findIndex(f => f.id === editingFolderId);
                if (index !== -1) {
                    folders[index].name = name;
                    folders[index].icon = selectedFolderIcon;
                    folders[index].parentId = parentId;
                }
                showToast('文件夹已更新');
                saveData();
                closeModal('folderModal');
                renderFolders();
                renderBookmarks();
            } else {
                const activeFolder = currentFolder;
                const searchText = document.getElementById('searchInput').value;
                const newId = 'folder_' + Date.now();
                folders.push({ id: newId, name, icon: selectedFolderIcon, parentId });
                showToast('文件夹已创建');
                saveData();
                closeModal('folderModal');

                currentFolder = activeFolder;
                renderFolders();
                setTimeout(() => {
                    const newItem = document.querySelector(`.folder-item[data-folder="${newId}"]`);
                    if (newItem) {
                        newItem.classList.add('new-item');
                    }
                }, 10);

                renderBookmarks(searchText);
            }
        }

        function deleteFolder(id) {
            if (!confirm('删除文件夹后，其中的书签将变为"未分类"。确定要删除吗？')) return;

            const folderItem = document.querySelector(`.folder-item[data-folder="${id}"]`);
            if (folderItem) {
                folderItem.classList.add('deleting');
                setTimeout(() => {
                    executeDeleteFolder(id);
                }, 300);
            } else {
                executeDeleteFolder(id);
            }
        }

        function executeDeleteFolder(id) {
            const deletedIds = getDescendantFolderIds(id);
            bookmarks.forEach(b => {
                if (deletedIds.has(b.folder)) b.folder = '';
            });
            folders = folders.filter(f => !deletedIds.has(f.id));
            saveData();
            if (currentFolder === id) currentFolder = 'all';
            renderFolders();
            renderBookmarks();
            showToast('文件夹已删除');
        }

        // ========== 书签操作 ==========
        function showAddBookmarkModal() {
            editingBookmarkId = null;
            document.getElementById('modalTitle').textContent = '添加书签';
            document.getElementById('bookmarkTitle').value = '';
            document.getElementById('bookmarkUrl').value = '';
            document.getElementById('bookmarkFolder').innerHTML = renderFolderOptions(currentFolder === 'all' ? '' : currentFolder);
            selectedBookmarkIcon = '🔗';
            document.querySelectorAll('#bookmarkIconPicker button').forEach(btn => btn.classList.remove('selected'));
            document.querySelector('#bookmarkIconPicker button:first-child').classList.add('selected');
            document.getElementById('bookmarkModal').classList.add('show');
        }

        function editBookmark(id) {
            const bookmark = bookmarks.find(b => b.id === id);
            if (!bookmark) return;

            editingBookmarkId = id;
            document.getElementById('modalTitle').textContent = '编辑书签';
            document.getElementById('bookmarkTitle').value = bookmark.title;
            document.getElementById('bookmarkUrl').value = bookmark.url;
            document.getElementById('bookmarkFolder').innerHTML = renderFolderOptions(bookmark.folder || '');
            selectedBookmarkIcon = bookmark.icon || '🔗';

            document.querySelectorAll('#bookmarkIconPicker button').forEach(btn => {
                btn.classList.remove('selected');
                if (btn.textContent === selectedBookmarkIcon) {
                    btn.classList.add('selected');
                }
            });

            document.getElementById('bookmarkModal').classList.add('show');
        }

        function saveBookmark() {
            const title = document.getElementById('bookmarkTitle').value.trim();
            let url = document.getElementById('bookmarkUrl').value.trim();
            const folder = document.getElementById('bookmarkFolder').value;

            if (!title) {
                showToast('请填写标题');
                return;
            }

            if (url && !url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'http://' + url;
            }

            if (editingBookmarkId) {
                const index = bookmarks.findIndex(b => b.id === editingBookmarkId);
                if (index !== -1) {
                    bookmarks[index].title = title;
                    bookmarks[index].url = url;
                    bookmarks[index].folder = folder;
                    bookmarks[index].icon = selectedBookmarkIcon;
                }
                showToast('书签已更新');
                saveData();
                closeModal('bookmarkModal');
                renderFolders();
                renderBookmarks();
            } else {
                const newId = Math.max(...bookmarks.map(b => b.id), 0) + 1;
                bookmarks.unshift({ id: newId, title, url, folder, icon: selectedBookmarkIcon });
                showToast('书签已添加');
                saveData();
                closeModal('bookmarkModal');
                renderFolders();
                renderBookmarks('', newId);
            }
        }

        function deleteBookmark(id) {
            if (!confirm('确定要删除这个书签吗？')) return;

            const bookmarkItem = document.querySelector(`.bookmark-item[data-bookmark-id="${id}"]`);
            if (bookmarkItem) {
                bookmarkItem.classList.add('deleting');
                setTimeout(() => {
                    executeDeleteBookmark(id);
                }, 300);
            } else {
                executeDeleteBookmark(id);
            }
        }

        function executeDeleteBookmark(id) {
            bookmarks = bookmarks.filter(b => b.id !== id);
            saveData();
            renderFolders();
            renderBookmarks();
            showToast('书签已删除');
        }

        function openBookmark(url) {
            const mode = document.getElementById('bookmarkOpenMode')?.value || localStorage.getItem('cc_browser_open_mode') || 'internal';
            localStorage.setItem('cc_browser_open_mode', mode);
            sessionStorage.setItem('openInBrowser', url);
            sessionStorage.setItem('openInBrowserMode', mode);
            window.location.href = `CC-browser.html?open=${encodeURIComponent(url)}&mode=${encodeURIComponent(mode)}`;
        }

        function copyBookmarkUrl(url) {
            navigator.clipboard.writeText(url).then(() => {
                showToast('网址已复制');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = url;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    showToast('网址已复制');
                } catch (err) {
                    showToast('复制失败');
                }
                document.body.removeChild(textarea);
            });
        }

        // ========== 导入导出 ==========
        function exportBookmarks() {
            const html = buildBookmarksHtml();
            const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `bookmarks_${new Date().toISOString().slice(0,10)}.html`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('书签已导出为浏览器 HTML');
        }

        function buildBookmarksHtml() {
            const now = Math.floor(Date.now() / 1000);
            const byFolder = new Map();
            bookmarks.forEach(bookmark => {
                const key = bookmark.folder || '';
                if (!byFolder.has(key)) byFolder.set(key, []);
                byFolder.get(key).push(bookmark);
            });

            const lines = [
                '<!DOCTYPE NETSCAPE-Bookmark-file-1>',
                '<!-- This is an automatically generated file.',
                '     It will be read and overwritten.',
                '     DO NOT EDIT! -->',
                '<META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=UTF-8">',
                '<TITLE>Bookmarks</TITLE>',
                '<H1>Bookmarks</H1>',
                '<DL><p>'
            ];

            (byFolder.get('') || []).forEach(bookmark => {
                lines.push('    ' + bookmarkToHtml(bookmark, now));
            });

            function writeFolder(folder, indent = '    ') {
                const folderBookmarks = byFolder.get(folder.id) || [];
                lines.push(`${indent}<DT><H3 ADD_DATE="${now}">${escapeHtml(folder.name)}</H3>`);
                lines.push(`${indent}<DL><p>`);
                folderBookmarks.forEach(bookmark => {
                    lines.push(`${indent}    ${bookmarkToHtml(bookmark, now)}`);
                });
                folders
                    .filter(child => (child.parentId || '') === folder.id)
                    .forEach(child => writeFolder(child, indent + '    '));
                lines.push(`${indent}</DL><p>`);
            }

            folders
                .filter(folder => !folder.parentId)
                .forEach(folder => writeFolder(folder));

            lines.push('</DL><p>');
            return lines.join('\n');
        }

        function bookmarkToHtml(bookmark, timestamp) {
            const href = escapeAttribute(bookmark.url || '');
            const title = escapeHtml(bookmark.title || bookmark.url || 'Untitled');
            return `<DT><A HREF="${href}" ADD_DATE="${timestamp}">${title}</A>`;
        }

        function showImportModal() {
            document.getElementById('importFile').value = '';
            document.getElementById('importModal').classList.add('show');
        }

        function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const text = e.target.result;
                    const result = file.name.toLowerCase().endsWith('.json')
                        ? importLegacyJson(text)
                        : importBookmarksHtml(text);
                    saveData();
                    renderFolders();
                    renderBookmarks(document.getElementById('searchInput').value);
                    showToast(`成功导入 ${result.imported} 个书签${result.skipped ? `，跳过 ${result.skipped} 个重复项` : ''}`);
                } catch (err) {
                    showToast('解析文件失败，请选择浏览器导出的 bookmarks.html');
                }
                closeModal('importModal');
            };
            reader.readAsText(file);
        }

        function importBookmarksHtml(htmlText) {
            const doc = new DOMParser().parseFromString(htmlText, 'text/html');
            const root = doc.querySelector('dl') || doc.body;
            let nextId = Math.max(0, ...bookmarks.map(b => Number(b.id) || 0)) + 1;
            let folderCounter = 0;
            let imported = 0;
            let skipped = 0;

            function getOrCreateFolder(path) {
                let parentId = '';
                for (const rawName of path.filter(Boolean)) {
                    const name = rawName.trim();
                    if (!name) continue;
                    let folder = folders.find(item => item.name === name && (item.parentId || '') === parentId);
                    if (!folder) {
                        folder = {
                            id: 'import_' + Date.now() + '_' + folderCounter++,
                            name,
                            icon: '📁',
                            parentId
                        };
                        folders.push(folder);
                    }
                    parentId = folder.id;
                }
                return parentId;
            }

            function addBookmark(anchor, path) {
                const url = anchor.getAttribute('href') || '';
                if (!url || bookmarks.some(existing => existing.url === url)) {
                    skipped++;
                    return;
                }
                bookmarks.push({
                    id: nextId++,
                    title: (anchor.textContent || url).trim(),
                    url,
                    folder: getOrCreateFolder(path),
                    icon: '🔗'
                });
                imported++;
            }

            function readDl(dl, path = []) {
                const children = Array.from(dl.children);
                for (let i = 0; i < children.length; i++) {
                    const node = children[i];
                    if (node.tagName === 'DT') {
                        const h3 = Array.from(node.children).find(child => child.tagName === 'H3');
                        if (h3) {
                            const nested = Array.from(node.children).find(child => child.tagName === 'DL')
                                || (children[i + 1] && children[i + 1].tagName === 'DL' ? children[++i] : null);
                            if (nested) readDl(nested, path.concat((h3.textContent || '').trim()));
                            continue;
                        }

                        const anchor = Array.from(node.children).find(child => child.tagName === 'A') || node.querySelector('a[href]');
                        if (anchor) addBookmark(anchor, path);
                    } else if (node.tagName === 'DL') {
                        readDl(node, path);
                    }
                }
            }

            readDl(root);
            if (imported === 0 && skipped === 0) throw new Error('No bookmarks found');
            return { imported, skipped };
        }

        function importLegacyJson(text) {
            const data = JSON.parse(text);
            if (!data.bookmarks || !Array.isArray(data.bookmarks)) throw new Error('Invalid JSON bookmarks');

            let nextId = Math.max(0, ...bookmarks.map(b => Number(b.id) || 0)) + 1;
            let imported = 0;
            let skipped = 0;

            if (data.folders && Array.isArray(data.folders)) {
                data.folders.forEach(folder => {
                    if (!folders.find(existing => existing.id === folder.id)) folders.push(folder);
                });
            }

            data.bookmarks.forEach(bookmark => {
                if (bookmarks.find(existing => existing.url === bookmark.url)) {
                    skipped++;
                    return;
                }
                bookmarks.push({ ...bookmark, id: nextId++ });
                imported++;
            });

            return { imported, skipped };
        }

        // ========== 工具函数 ==========
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeAttribute(text) {
            return escapeHtml(text).replace(/"/g, '&quot;');
        }

        // ========== 初始化 ==========
        loadBg();
        loadData();
        document.getElementById('pageSizeSelect').value = pageSize;
    </script>

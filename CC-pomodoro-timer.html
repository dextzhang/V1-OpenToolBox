<!DOCTYPE html>
<html lang="zh-CN" data-page="cc-pomodoro-timer">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>番茄时钟 - 超超工具箱</title>
    <link rel="stylesheet" href="cc-styles.css?v=2.2.1">
    <style>
        html[data-page="cc-pomodoro-timer"] * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html[data-page="cc-pomodoro-timer"] body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #0a0a0f;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #e8e8e8;
            position: relative;
            overflow: hidden;
        }
        html[data-page="cc-pomodoro-timer"] #bg-layer {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('') center/cover no-repeat;
            opacity: var(--cc-bg-opacity, 1);
            filter: blur(var(--cc-bg-blur, 10px)) brightness(var(--cc-bg-brightness, 0.48));
            transform: scale(1.08);
            pointer-events: none;
            z-index: -1;
        }
        html[data-page="cc-pomodoro-timer"] body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.48);
            pointer-events: none;
            z-index: -1;
        }
        html[data-page="cc-pomodoro-timer"] .back-btn {
            position: fixed;
            top: 16px;
            left: 16px;
            padding: 8px 16px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.18) 0%, rgba(255, 255, 255, 0.08) 100%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
            color: #e8e8e8;
            transition: all 0.3s;
            z-index: 9999;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        html[data-page="cc-pomodoro-timer"] .back-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.25) 0%, rgba(255, 255, 255, 0.12) 100%);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
        }
        html[data-page="cc-pomodoro-timer"] .bg-refresh {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.18) 0%, rgba(255, 255, 255, 0.08) 100%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            color: #e8e8e8;
            transition: all 0.3s;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        html[data-page="cc-pomodoro-timer"] .bg-refresh:hover {
            transform: rotate(180deg);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.25) 0%, rgba(255, 255, 255, 0.12) 100%);
        }
        html[data-page="cc-pomodoro-timer"] .bg-refresh.spinning {
            animation: spin 0.6s ease-in-out;
        }
        html[data-page="cc-pomodoro-timer"] .menu-btn {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 42px;
            height: 42px;
            background: rgba(32, 32, 36, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            color: rgba(248, 250, 252, 0.92);
            transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
            backdrop-filter: blur(18px) saturate(1.25);
            -webkit-backdrop-filter: blur(18px) saturate(1.25);
        }
        html[data-page="cc-pomodoro-timer"] .menu-btn:hover {
            background: rgba(44, 44, 48, 0.82);
            border-color: rgba(125, 211, 252, 0.42);
            transform: translateY(-1px);
        }
        html[data-page="cc-pomodoro-timer"] .menu-panel {
            position: fixed;
            top: 60px;
            right: 16px;
            width: 280px;
            background: linear-gradient(145deg, rgba(20, 20, 30, 0.95) 0%, rgba(10, 10, 20, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            z-index: 9998;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            opacity: 0;
            transform: translateY(-10px) scale(0.95);
            transition: all 0.3s ease;
            pointer-events: none;
        }
        html[data-page="cc-pomodoro-timer"] .menu-panel.show {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }
        html[data-page="cc-pomodoro-timer"] .menu-section {
            margin-bottom: 16px;
        }
        html[data-page="cc-pomodoro-timer"] .menu-section:last-child {
            margin-bottom: 0;
        }
        html[data-page="cc-pomodoro-timer"] .menu-section-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        html[data-page="cc-pomodoro-timer"] .bg-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        html[data-page="cc-pomodoro-timer"] .bg-item {
            aspect-ratio: 1;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            overflow: hidden;
            background-size: cover;
            background-position: center;
        }
        html[data-page="cc-pomodoro-timer"] .bg-item:hover {
            transform: scale(1.1);
            border-color: rgba(255, 255, 255, 0.4);
        }
        html[data-page="cc-pomodoro-timer"] .bg-item.active {
            border-color: #e8a87c;
            box-shadow: 0 0 0 2px rgba(232, 168, 124, 0.3);
        }
        html[data-page="cc-pomodoro-timer"] .noise-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        html[data-page="cc-pomodoro-timer"] .noise-item {
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.7);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        html[data-page="cc-pomodoro-timer"] .noise-item:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
        }
        html[data-page="cc-pomodoro-timer"] .noise-item.active {
            background: rgba(232, 168, 124, 0.2);
            border-color: #e8a87c;
            color: #e8a87c;
        }
        html[data-page="cc-pomodoro-timer"] .noise-volume {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }
        html[data-page="cc-pomodoro-timer"] .noise-volume span {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.6);
        }
        html[data-page="cc-pomodoro-timer"] .noise-volume input {
            flex: 1;
            -webkit-appearance: none;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
        }
        html[data-page="cc-pomodoro-timer"] .noise-volume input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #e8a87c;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 0 3px rgba(232, 168, 124, 0.2);
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        html[data-page="cc-pomodoro-timer"] .timer-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.22) 0%, rgba(255, 255, 255, 0.08) 100%);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.35);
            text-align: center;
            width: 340px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }
        html[data-page="cc-pomodoro-timer"] .header h1 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 2px;
        }
        html[data-page="cc-pomodoro-timer"] .header p {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.7);
        }
        html[data-page="cc-pomodoro-timer"] .time-inputs {
            display: none;
            gap: 6px;
            justify-content: center;
        }
        html[data-page="cc-pomodoro-timer"] .time-inputs.hidden {
            display: none;
        }
        html[data-page="cc-pomodoro-timer"] .time-inputs:not(.hidden) {
            display: flex;
        }
        html[data-page="cc-pomodoro-timer"] .time-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        html[data-page="cc-pomodoro-timer"] .time-group label {
            font-size: 0.55rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        html[data-page="cc-pomodoro-timer"] .time-value {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #e8e8e8;
            text-align: center;
            outline: none;
            transition: all 0.3s;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        html[data-page="cc-pomodoro-timer"] .time-value:focus {
            border-color: #e8a87c;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
        }
        html[data-page="cc-pomodoro-timer"] .time-separator {
            font-size: 1.2rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.7);
            padding-top: 14px;
        }
        html[data-page="cc-pomodoro-timer"] .progress-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto;
        }
        html[data-page="cc-pomodoro-timer"] .progress-ring {
            transform: rotate(-90deg);
            width: 200px;
            height: 200px;
        }
        html[data-page="cc-pomodoro-timer"] .progress-ring-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.15);
            stroke-width: 8;
        }
        html[data-page="cc-pomodoro-timer"] .progress-ring-progress {
            fill: none;
            stroke: #e8a87c;
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear;
        }
        html[data-page="cc-pomodoro-timer"] .timer-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
        }
        html[data-page="cc-pomodoro-timer"] .timer-running-time {
            font-size: 2rem;
            font-weight: 700;
            color: #e8e8e8;
            font-variant-numeric: tabular-nums;
        }
        html[data-page="cc-pomodoro-timer"] .timer-status {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 4px;
        }
        html[data-page="cc-pomodoro-timer"] .mode-tabs {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
        }
        html[data-page="cc-pomodoro-timer"] .mode-tab {
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 10px;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 500;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        html[data-page="cc-pomodoro-timer"] .mode-tab:hover {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.35);
        }
        html[data-page="cc-pomodoro-timer"] .mode-tab.active {
            background: rgba(232, 168, 124, 0.35);
            border-color: #e8a87c;
            color: #e8a87c;
        }
        html[data-page="cc-pomodoro-timer"] .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        html[data-page="cc-pomodoro-timer"] .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 14px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        html[data-page="cc-pomodoro-timer"] .btn-primary {
            background: linear-gradient(135deg, #e8a87c 0%, #d4956a 100%);
            color: white;
            box-shadow: 0 6px 20px rgba(232, 168, 124, 0.35);
        }
        html[data-page="cc-pomodoro-timer"] .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(232, 168, 124, 0.45);
        }
        html[data-page="cc-pomodoro-timer"] .btn-secondary {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 14px;
            color: #e8e8e8;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        html[data-page="cc-pomodoro-timer"] .btn-secondary:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.22);
        }
        html[data-page="cc-pomodoro-timer"] .stats {
            display: flex;
            gap: 32px;
            justify-content: center;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.22);
        }
        html[data-page="cc-pomodoro-timer"] .stat-item {
            text-align: center;
        }
        html[data-page="cc-pomodoro-timer"] .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #e8e8e8;
        }
        html[data-page="cc-pomodoro-timer"] .stat-label {
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 4px;
            text-transform: uppercase;
        }
        html[data-page="cc-pomodoro-timer"] .notification {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.25) 0%, rgba(255, 255, 255, 0.12) 100%);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 12px 24px;
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
            font-size: 0.85rem;
            color: #e8e8e8;
            z-index: 1000;
            transition: transform 0.4s;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        html[data-page="cc-pomodoro-timer"] .notification.show {
            transform: translateX(-50%) translateY(0);
        }

        /* 修复菜单相关样式，确保菜单正常显示 */
        html[data-page="cc-pomodoro-timer"] .cc-menu-submenu-wrapper {
            margin: 2px 0 !important;
            padding: 0 !important;
        }
        html[data-page="cc-pomodoro-timer"] .cc-menu-submenu-title {
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
            padding: 0 11px !important;
            height: 38px !important;
            cursor: pointer !important;
            border-radius: 9px !important;
            color: rgba(255,255,255,0.68) !important;
            font-size: 13px !important;
            opacity: 0 !important;
            transform: translateY(-4px) !important;
            transition: opacity 0.18s ease, transform 0.2s ease, background 0.18s ease !important;
        }
        html[data-page="cc-pomodoro-timer"] .cc-quick-actions.expanded .cc-menu-submenu-title {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }
        html[data-page="cc-pomodoro-timer"] .cc-menu-submenu-title:hover {
            background: rgba(255,255,255,0.08) !important;
        }
        html[data-page="cc-pomodoro-timer"] .cc-menu-submenu-arrow {
            font-size: 10px !important;
            transition: transform 0.2s !important;
            opacity: 0.5 !important;
        }
        html[data-page="cc-pomodoro-timer"] .cc-menu-submenu-title:hover .cc-menu-submenu-arrow {
            opacity: 1 !important;
        }
        html[data-page="cc-pomodoro-timer"] .cc-menu-submenu-panel {
            display: none !important;
            padding-left: 8px !important;
            margin: 2px 0 !important;
        }
        html[data-page="cc-pomodoro-timer"] .cc-menu-submenu-panel.show {
            display: grid !important;
            gap: 2px !important;
        }
        html[data-page="cc-pomodoro-timer"] .cc-menu-submenu-panel .cc-menu-item {
            width: 100% !important;
            min-width: 0 !important;
            height: 32px !important;
            justify-content: flex-start !important;
            padding: 0 11px !important;
            font-size: 12px !important;
            letter-spacing: 0 !important;
            background: transparent !important;
            border-color: transparent !important;
            box-shadow: none !important;
            opacity: 0 !important;
            transform: translateY(-4px) !important;
            transition: opacity 0.18s ease, transform 0.2s ease, background 0.18s ease, border-color 0.18s ease !important;
        }
        html[data-page="cc-pomodoro-timer"] .cc-quick-actions.expanded .cc-menu-submenu-panel .cc-menu-item {
            opacity: 0.7 !important;
            transform: translateY(0) !important;
        }
        html[data-page="cc-pomodoro-timer"] .cc-menu-submenu-panel .cc-menu-item:hover {
            opacity: 1 !important;
            background: rgba(255,255,255,0.1) !important;
        }
        html[data-page="cc-pomodoro-timer"] .cc-menu-submenu-panel .cc-menu-item.active {
            opacity: 1 !important;
            background: rgba(255,255,255,0.12) !important;
            color: #fff !important;
        }

        @media (max-width: 400px) {
            html[data-page="cc-pomodoro-timer"] .timer-card {
                width: 300px;
                padding: 16px;
            }
            html[data-page="cc-pomodoro-timer"] .progress-wrapper {
                width: 180px;
                height: 180px;
            }
            html[data-page="cc-pomodoro-timer"] .progress-ring {
                width: 180px;
                height: 180px;
            }
            html[data-page="cc-pomodoro-timer"] .timer-running-time {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div id="bg-layer"></div>
    <button class="back-btn" onclick="goHome()">🏠 返回</button>
    <button class="menu-btn" id="menuBtn" onclick="toggleMenu()">⚙️</button>

    <!-- 菜单面板 -->
    <div class="menu-panel" id="menuPanel">
        <!-- 背景选择 -->
        <div class="menu-section">
            <div class="menu-section-title">🌄 背景图片</div>
            <div class="bg-grid" id="bgGrid"></div>
        </div>

        <!-- 白噪音 -->
        <div class="menu-section">
            <div class="menu-section-title">🎵 白噪音</div>
            <div class="noise-grid" id="noiseGrid"></div>
            <div class="noise-volume">
                <span>🔈</span>
                <input type="range" id="noiseVolume" min="0" max="1" step="0.1" value="0.3">
                <span>🔊</span>
            </div>
        </div>
    </div>

    <div class="notification" id="notification"></div>

    <div class="timer-card">
        <div class="header">
            <h1>🍅 番茄时钟</h1>
            <p>专注工作，高效休息</p>
        </div>

        <div class="time-inputs hidden" id="timeInputs">
            <div class="time-group">
                <label>时</label>
                <input type="number" class="time-value" id="inputHours" min="0" max="99" value="0">
            </div>
            <span class="time-separator">:</span>
            <div class="time-group">
                <label>分</label>
                <input type="number" class="time-value" id="inputMinutes" min="0" max="59" value="25">
            </div>
            <span class="time-separator">:</span>
            <div class="time-group">
                <label>秒</label>
                <input type="number" class="time-value" id="inputSeconds" min="0" max="59" value="0">
            </div>
        </div>

        <div class="progress-wrapper">
            <svg class="progress-ring" viewBox="0 0 200 200">
                <circle class="progress-ring-bg" cx="100" cy="100" r="90"></circle>
                <circle class="progress-ring-progress" id="progressRing" cx="100" cy="100" r="90"></circle>
            </svg>
            <div class="timer-center">
                <div class="timer-running-time" id="timerRunningDisplay">25:00</div>
                <div class="timer-status" id="timerStatus">点击开始</div>
            </div>
        </div>

        <div class="mode-tabs">
            <button class="mode-tab" data-mode="work" onclick="setMode('work')">专注 25分</button>
            <button class="mode-tab" data-mode="short" onclick="setMode('short')">短休 5分</button>
            <button class="mode-tab" data-mode="long" onclick="setMode('long')">长休 15分</button>
            <button class="mode-tab active" data-mode="custom" onclick="setMode('custom')">自定义</button>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn" onclick="toggleTimer()">
                <span id="startIcon">▶</span>
                <span id="startText">开始</span>
            </button>
            <button class="btn btn-secondary" onclick="resetTimer()">↺</button>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="todayCount">0</div>
                <div class="stat-label">今日完成</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">累计完成</div>
            </div>
        </div>
    </div>

    <script>
        function goHome() {
            window.location.href = 'index.html';
        }

        function randomBg() {
            const url = `images/bg${Math.floor(Math.random() * 8) + 1}.jpg`;
            document.getElementById('bg-layer').style.backgroundImage = `url('${url}')`;
        }

        function saveBg(url) {
            localStorage.setItem('bgImage', url);
        }

        function loadBg() {
            const saved = localStorage.getItem('bgImage');
            if (saved) {
                document.getElementById('bg-layer').style.backgroundImage = `url('${saved}')`;
            } else {
                randomBg();
            }
        }

        function changeBackground() {
            const url = `images/bg${Math.floor(Math.random() * 8) + 1}.jpg`;
            document.getElementById('bg-layer').style.backgroundImage = `url('${url}')`;
            saveBg(url);
        }

        // 菜单功能
        let menuOpen = false;
        let currentNoise = null;
        let audioElement = null;

        function toggleMenu() {
            menuOpen = !menuOpen;
            const panel = document.getElementById('menuPanel');
            if (menuOpen) {
                panel.classList.add('show');
            } else {
                panel.classList.remove('show');
            }
        }

        // 点击外部关闭菜单
        document.addEventListener('click', function(e) {
            const menuBtn = document.getElementById('menuBtn');
            const menuPanel = document.getElementById('menuPanel');
            if (!menuBtn.contains(e.target) && !menuPanel.contains(e.target)) {
                menuOpen = false;
                menuPanel.classList.remove('show');
            }
        });

        // 背景图片数据
        const bgImages = [
            { id: 1, name: '山景', url: 'images/bg1.jpg' },
            { id: 2, name: '海岸', url: 'images/bg2.jpg' },
            { id: 3, name: '森林', url: 'images/bg3.jpg' },
            { id: 4, name: '星空', url: 'images/bg4.jpg' },
            { id: 5, name: '城市', url: 'images/bg5.jpg' },
            { id: 6, name: '日落', url: 'images/bg6.jpg' },
            { id: 7, name: '雪景', url: 'images/bg7.jpg' },
            { id: 8, name: '花园', url: 'images/bg8.jpg' }
        ];

        // 白噪音数据（使用更稳定的音频源）
        const noises = [
            { id: 'rain', name: '🌧️ 雨声', url: 'https://www.orangefreesounds.com/wp-content/uploads/2014/11/Rainy-mood.mp3' },
            { id: 'waves', name: '🌊 海浪', url: 'https://www.orangefreesounds.com/wp-content/uploads/2015/05/Waves-on-the-beach.mp3' },
            { id: 'fire', name: '🔥 篝火', url: 'https://www.orangefreesounds.com/wp-content/uploads/2019/05/Fire-crackling-sound.mp3' },
            { id: 'forest', name: '🌲 森林', url: 'https://www.orangefreesounds.com/wp-content/uploads/2017/09/Forest-ambience.mp3' },
            { id: 'bird', name: '🐦 鸟鸣', url: 'https://www.orangefreesounds.com/wp-content/uploads/2021/01/Sounds-in-a-forest.mp3' },
            { id: 'cafe', name: '☕ 咖啡馆', url: 'https://www.orangefreesounds.com/wp-content/uploads/2016/04/Restaurant-ambience.mp3' }
        ];

        // 初始化背景选择
        function initBgGrid() {
            const bgGrid = document.getElementById('bgGrid');
            bgGrid.innerHTML = '';
            bgImages.forEach(bg => {
                const div = document.createElement('div');
                div.className = 'bg-item';
                div.style.backgroundImage = `url('${bg.url}')`;
                div.onclick = () => selectBg(bg);
                bgGrid.appendChild(div);
            });
            updateBgActive();
        }

        // 选择背景
        function selectBg(bg) {
            document.getElementById('bg-layer').style.backgroundImage = `url('${bg.url}')`;
            saveBg(bg.url);
            updateBgActive();
        }

        // 更新背景选中状态
        function updateBgActive() {
            const bgItems = document.querySelectorAll('.bg-item');
            const currentBg = document.getElementById('bg-layer').style.backgroundImage;
            bgItems.forEach((item, index) => {
                const itemUrl = item.style.backgroundImage;
                if (itemUrl === currentBg) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        // 初始化白噪音
        function initNoiseGrid() {
            const noiseGrid = document.getElementById('noiseGrid');
            noiseGrid.innerHTML = '';
            noises.forEach(noise => {
                const div = document.createElement('div');
                div.className = 'noise-item';
                div.textContent = noise.name;
                div.onclick = () => selectNoise(noise);
                noiseGrid.appendChild(div);
            });
        }

        // 选择白噪音
        function selectNoise(noise) {
            // 停止当前播放
            if (audioElement) {
                audioElement.pause();
                audioElement = null;
            }

            // 如果点击的是同一个，则停止
            if (currentNoise && currentNoise.id === noise.id) {
                currentNoise = null;
                updateNoiseActive();
                showNotification('🔇 已停止白噪音');
                return;
            }

            // 播放新的
            currentNoise = noise;
            audioElement = new Audio();
            audioElement.src = noise.url;
            audioElement.loop = true;
            audioElement.volume = parseFloat(document.getElementById('noiseVolume').value);

            // 添加加载和错误处理
            audioElement.addEventListener('canplaythrough', () => {
                audioElement.play().then(() => {
                    showNotification(`🎵 正在播放: ${noise.name}`);
                }).catch(err => {
                    console.log('音频播放失败:', err);
                    showNotification('👆 请先点击页面任意位置，再选择白噪音');
                    currentNoise = null;
                    updateNoiseActive();
                });
            });

            audioElement.addEventListener('error', (e) => {
                console.log('音频加载失败:', e);
                showNotification(`⚠️ 音频加载失败，请尝试其他声音`);
                currentNoise = null;
                updateNoiseActive();
            });

            // 尝试直接播放（短音频可能直接加载）
            audioElement.play().catch(() => {
                // 等待 canplaythrough 事件
            });

            updateNoiseActive();
        }

        // 更新白噪音选中状态
        function updateNoiseActive() {
            const noiseItems = document.querySelectorAll('.noise-item');
            noiseItems.forEach((item, index) => {
                if (currentNoise && noises[index].id === currentNoise.id) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        const modes = {
            work: { hours: 0, minutes: 25, seconds: 0, label: '专注中' },
            short: { hours: 0, minutes: 5, seconds: 0, label: '休息一下' },
            long: { hours: 0, minutes: 15, seconds: 0, label: '好好休息' },
            custom: { hours: 0, minutes: 25, seconds: 0, label: '自定义计时' }
        };

        let currentMode = 'custom';
        let timeLeft = modes.custom.hours * 3600 + modes.custom.minutes * 60 + modes.custom.seconds;
        let totalTime = timeLeft;
        let isRunning = false;
        let timerInterval = null;
        let today = new Date().toDateString();

        const circumference = 2 * Math.PI * 90;

        function updateProgressRing(progress) {
            const ring = document.getElementById('progressRing');
            ring.style.strokeDasharray = circumference;
            // 确保归零时完全变成空的
            if (progress <= 0) {
                ring.style.strokeDashoffset = circumference;
            } else {
                ring.style.strokeDashoffset = circumference * (1 - progress);
            }
        }

        function init() {
            loadStats();
            updateDisplay();
            checkDayChange();
            loadBg();
            updateProgressRing(1);
            initBgGrid();
            initNoiseGrid();

            // 音量控制
            document.getElementById('noiseVolume').addEventListener('input', function(e) {
                if (audioElement) {
                    audioElement.volume = parseFloat(e.target.value);
                }
            });
        }

        function loadStats() {
            const stats = JSON.parse(localStorage.getItem('pomodoroStats') || '{"today":0,"total":0,"lastDate":""}');
            if (stats.lastDate !== today) {
                stats.today = 0;
                stats.lastDate = today;
                localStorage.setItem('pomodoroStats', JSON.stringify(stats));
            }
            document.getElementById('todayCount').textContent = stats.today;
            document.getElementById('totalCount').textContent = stats.total;
        }

        function saveStats() {
            const stats = {
                today: parseInt(document.getElementById('todayCount').textContent),
                total: parseInt(document.getElementById('totalCount').textContent),
                lastDate: today
            };
            localStorage.setItem('pomodoroStats', JSON.stringify(stats));
        }

        function checkDayChange() {
            const currentDay = new Date().toDateString();
            if (currentDay !== today) {
                today = currentDay;
                document.getElementById('todayCount').textContent = '0';
                saveStats();
            }
        }

        function getInputTime() {
            const h = parseInt(document.getElementById('inputHours').value) || 0;
            const m = parseInt(document.getElementById('inputMinutes').value) || 0;
            const s = parseInt(document.getElementById('inputSeconds').value) || 0;
            return h * 3600 + m * 60 + s;
        }

        function setMode(mode) {
            if (isRunning) pauseTimer();
            currentMode = mode;

            document.querySelectorAll('.mode-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.mode === mode);
            });

            const timeInputs = document.getElementById('timeInputs');
            if (mode === 'custom') {
                timeInputs.classList.remove('hidden');
                timeInputs.style.display = 'flex';
                document.getElementById('timerStatus').textContent = '设置时间后开始';
            } else {
                timeInputs.classList.add('hidden');
                timeInputs.style.display = 'none';
                document.getElementById('timerStatus').textContent = modes[mode].label;
            }

            timeLeft = modes[mode].hours * 3600 + modes[mode].minutes * 60 + modes[mode].seconds;
            totalTime = timeLeft;
            updateDisplay();
        }

        function toggleTimer() {
            if (isRunning) pauseTimer();
            else startTimer();
        }

        function startTimer() {
            if (currentMode === 'custom') {
                timeLeft = getInputTime();
                totalTime = timeLeft;
            }
            if (timeLeft <= 0) {
                showNotification('⚠️ 请设置时间');
                return;
            }
            isRunning = true;
            document.getElementById('startIcon').textContent = '⏸';
            document.getElementById('startText').textContent = '暂停';
            document.getElementById('timerStatus').textContent = '计时中...';

            // 立即更新一次显示
            updateDisplay();

            // 立即减1秒并更新，确保进度条马上开始走
            timeLeft--;
            updateDisplay();
            if (timeLeft <= 0) {
                completeTimer();
                return;
            }

            timerInterval = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) completeTimer();
            }, 1000);
        }

        function pauseTimer() {
            isRunning = false;
            clearInterval(timerInterval);
            document.getElementById('startIcon').textContent = '▶';
            document.getElementById('startText').textContent = '继续';
            document.getElementById('timerStatus').textContent = '已暂停';
        }

        function resetTimer() {
            pauseTimer();
            document.getElementById('startIcon').textContent = '▶';
            document.getElementById('startText').textContent = '开始';

            if (currentMode === 'custom') {
                timeLeft = getInputTime();
                totalTime = timeLeft;
                document.getElementById('timerStatus').textContent = '设置时间后开始';
            } else {
                timeLeft = modes[currentMode].hours * 3600 + modes[currentMode].minutes * 60 + modes[currentMode].seconds;
                totalTime = timeLeft;
                document.getElementById('timerStatus').textContent = modes[currentMode].label;
            }
            updateDisplay();
        }

        function completeTimer() {
            pauseTimer();
            // 确保进度条完全变成空的
            timeLeft = 0;
            updateDisplay();

            const isWork = currentMode === 'work' || currentMode === 'custom';

            if (isWork) {
                const todayCount = parseInt(document.getElementById('todayCount').textContent) + 1;
                const totalCount = parseInt(document.getElementById('totalCount').textContent) + 1;
                document.getElementById('todayCount').textContent = todayCount;
                document.getElementById('totalCount').textContent = totalCount;
                saveStats();
                showNotification('🎉 时间到！休息一下吧！');
            } else {
                showNotification('☕ 休息结束！继续加油！');
            }

            setMode('work');
            timeLeft = modes.work.hours * 3600 + modes.work.minutes * 60 + modes.work.seconds;
            totalTime = timeLeft;
            document.getElementById('startIcon').textContent = '▶';
            document.getElementById('startText').textContent = '开始';
            updateDisplay();
        }

        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            if (h > 0) return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function updateDisplay() {
            document.getElementById('timerRunningDisplay').textContent = formatTime(timeLeft);
            const progress = totalTime > 0 ? timeLeft / totalTime : 0;
            updateProgressRing(progress);
        }

        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.classList.add('show');
            setTimeout(() => notification.classList.remove('show'), 3000);
        }

        init();
    </script>
    <script src="cc-common.js?v=2.2.1"></script>
</body>
</html>

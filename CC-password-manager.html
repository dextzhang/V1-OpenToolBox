<!DOCTYPE html>
<html lang="zh-CN" data-page="cc-password-manager">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码生成器 - 超超工具箱</title>
    <link rel="stylesheet" href="cc-styles.css?v=3.3.2">
</head>
<body>
    <div id="bg-layer"></div>
    <button class="back-btn" onclick="goHome()">🏠 返回</button>

    <div class="container">
        <div class="header">
            <h1><span class="lock-icon" aria-hidden="true">🔐</span>密码生成器</h1>
            <p>安全生成，一键管理</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('generator')">密码生成</button>
            <button class="tab" onclick="switchTab('manager')">密码管理</button>
            <button class="tab" onclick="switchTab('history')">历史记录</button>
        </div>

        <div id="generator-tab" class="tab-content active">
            <div class="generator-layout">
                <div class="generator-left">
                    <div class="card">
                        <div class="card-title">⚙️ 生成选项</div>
                        <div class="length-control">
                            <div class="length-label">
                                <span>密码长度</span>
                                <span class="length-value" id="lengthValue">16</span>
                            </div>
                            <input type="range" class="length-slider" id="lengthSlider" min="8" max="64" value="16" oninput="updateLength()">
                        </div>
                        <div class="options-grid">
                            <div class="option-item">
                                <input type="checkbox" id="optUppercase" checked onchange="generatePassword()">
                                <label for="optUppercase">大写字母 (A-Z)</label>
                            </div>
                            <div class="option-item">
                                <input type="checkbox" id="optLowercase" checked onchange="generatePassword()">
                                <label for="optLowercase">小写字母 (a-z)</label>
                            </div>
                            <div class="option-item">
                                <input type="checkbox" id="optNumbers" checked onchange="generatePassword()">
                                <label for="optNumbers">数字 (0-9)</label>
                            </div>
                            <div class="option-item">
                                <input type="checkbox" id="optSymbols" checked onchange="generatePassword()">
                                <label for="optSymbols">特殊字符 (!@#$)</label>
                            </div>
                        </div>

                        <div class="section-divider">
                            <span>📋 预设模板</span>
                        </div>
                        <div class="template-buttons">
                            <button class="btn template-btn" onclick="applyTemplate('strong')">🔥 高强度</button>
                            <button class="btn template-btn" onclick="applyTemplate('balanced')">⚖️ 均衡</button>
                            <button class="btn template-btn" onclick="applyTemplate('memorable')">💭 易记</button>
                        </div>

                        <div class="section-divider">
                            <span>🎲 批量生成</span>
                        </div>
                        <div class="batch-controls">
                            <input type="number" id="batchCount" min="1" max="20" value="5">
                            <button class="btn btn-secondary" onclick="batchGenerate()">批量生成</button>
                        </div>
                        <div id="batchResults" class="batch-results"></div>
                    </div>
                </div>

                <div class="generator-right">
                    <div class="card">
                        <div class="card-title">🔑 生成的密码</div>
                        <div class="password-display">
                            <input type="text" class="password-field" id="passwordOutput" readonly value="">
                        </div>
                        <div class="password-actions">
                            <button class="btn btn-primary" onclick="generatePassword()">
                                🎲 生成密码
                            </button>
                            <button class="btn-icon" onclick="copyPassword()" title="复制密码">
                                📋
                            </button>
                            <button class="btn-icon" onclick="togglePasswordVisibility()" title="显示/隐藏">
                                👁️
                            </button>
                            <button class="btn-icon" onclick="savePassword()" title="保存密码">
                                💾
                            </button>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-title">📊 密码强度</div>
                        <div class="strength-meter">
                            <div class="strength-bar">
                                <div class="strength-fill" id="strengthFill"></div>
                            </div>
                            <div class="strength-text">
                                <span class="strength-label" id="strengthLabel">中等</span>
                                <span class="strength-hint" id="strengthHint">建议增加长度或添加特殊字符</span>
                            </div>
                        </div>
                        <div class="security-checks">
                            <div class="check-item" id="checkLeak">
                                <span class="check-icon">🔍</span>
                                <span>检查是否泄露</span>
                                <button class="btn btn-secondary check-btn" onclick="checkLeak()">检查</button>
                            </div>
                            <div class="entropy-display">
                                <span>熵值: <strong id="entropyValue">0</strong> bits</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="manager-tab" class="tab-content">
            <div class="generator-layout">
                <div class="card" style="width: 100%;">
                    <div class="card-title">
                        <span>📁 已保存的密码</span>
                        <div class="manager-actions">
                            <input type="text" class="search-input" id="searchInput" placeholder="🔍 搜索密码..." oninput="filterPasswords()">
                            <select id="categoryFilter" class="category-select" onchange="filterPasswords()">
                                <option value="all">全部标签</option>
                            </select>
                            <button class="btn btn-secondary" onclick="exportPasswords()">📤 导出</button>
                            <label class="btn btn-secondary import-btn">
                                📥 导入
                                <input type="file" accept=".json" onchange="importPasswords(event)">
                            </label>
                            <button class="btn btn-secondary" onclick="openSaveModal()">+ 添加密码</button>
                        </div>
                    </div>
                    <div class="saved-list" id="savedList">
                        <div class="empty-state" id="emptyState">
                            暂无保存的密码<br>
                            <small style="color: #adb5bd;">点击生成密码后，使用 💾 按钮保存</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="history-tab" class="tab-content">
            <div class="generator-layout">
                <div class="card" style="width: 100%;">
                    <div class="card-title">
                        <span>📜 生成历史</span>
                        <button class="btn btn-secondary" onclick="clearHistory()" style="margin-left: auto;">🗑️ 清空历史</button>
                    </div>
                    <div class="password-history" id="historyList">
                        <div class="empty-state" id="emptyHistory">
                            暂无历史记录
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="saveModal">
        <div class="modal-content">
            <div class="modal-title">💾 保存密码</div>
            <div class="form-group">
                <label>密码名称 *</label>
                <input type="text" id="saveName" placeholder="例如：QQ账号、邮箱">
            </div>
            <div class="form-group">
                <label>账号/用户名</label>
                <input type="text" id="saveAccount" placeholder="例如：12345678@qq.com">
            </div>
            <div class="form-group">
                <label>网站/应用</label>
                <input type="text" id="saveWebsite" placeholder="例如：QQ、微信">
            </div>
            <div class="form-group">
                <label>标签 (逗号分隔)</label>
                <input type="text" id="saveTags" placeholder="例如：社交, 工作, 娱乐">
            </div>
            <div class="form-group">
                <label>过期提醒 (天)</label>
                <input type="number" id="saveExpiry" min="0" value="90" placeholder="0表示不过期">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeSaveModal()">取消</button>
                <button class="btn btn-primary" onclick="confirmSave()">保存</button>
            </div>
        </div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-title">✏️ 编辑密码</div>
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>密码名称 *</label>
                <input type="text" id="editName" placeholder="例如：QQ账号、邮箱">
            </div>
            <div class="form-group">
                <label>账号/用户名</label>
                <input type="text" id="editAccount" placeholder="例如：12345678@qq.com">
            </div>
            <div class="form-group">
                <label>网站/应用</label>
                <input type="text" id="editWebsite" placeholder="例如：QQ、微信">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="text" id="editPassword" placeholder="密码">
            </div>
            <div class="form-group">
                <label>标签 (逗号分隔)</label>
                <input type="text" id="editTags" placeholder="例如：社交, 工作, 娱乐">
            </div>
            <div class="form-group">
                <label>过期提醒 (天)</label>
                <input type="number" id="editExpiry" min="0" value="90" placeholder="0表示不过期">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeEditModal()">取消</button>
                <button class="btn btn-primary" onclick="confirmEdit()">保存</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        function goHome() {
            window.location.href = 'index.html';
        }

        const UPPERCASE = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const LOWERCASE = 'abcdefghijklmnopqrstuvwxyz';
        const NUMBERS = '0123456789';
        const SYMBOLS = '!@#$%^&*()_+-=[]{}|;:,.<>?';

        let savedPasswords = JSON.parse(localStorage.getItem('savedPasswords') || '[]');
        let passwordHistory = JSON.parse(localStorage.getItem('passwordHistory') || '[]');
        let currentPassword = '';
        let passwordVisible = false;
        let currentCategory = 'all';
        let searchQuery = '';

        function init() {
            loadTheme();
            renderSavedList();
            renderHistory();
            updateCategoryFilter();
            generatePassword();
            setupKeyboardShortcuts();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(tabName + '-tab').classList.add('active');
        }

        function updateLength() {
            const length = document.getElementById('lengthSlider').value;
            document.getElementById('lengthValue').textContent = length;
            generatePassword();
        }

        function generatePassword() {
            const password = createPasswordFromCurrentOptions();
            if (!password) return;

            currentPassword = password;
            updatePasswordDisplay();
            updateStrength(password);
            addToHistory(password);
        }

        function updatePasswordDisplay() {
            const output = document.getElementById('passwordOutput');
            if (passwordVisible) {
                output.value = currentPassword;
            } else {
                output.value = '•'.repeat(currentPassword.length);
            }
        }

        function togglePasswordVisibility() {
            passwordVisible = !passwordVisible;
            updatePasswordDisplay();
        }

        function updateStrength(password) {
            let score = 0;
            const length = password.length;

            if (length >= 8) score++;
            if (length >= 12) score++;
            if (length >= 16) score++;
            if (length >= 24) score++;

            if (/[a-z]/.test(password)) score++;
            if (/[A-Z]/.test(password)) score++;
            if (/[0-9]/.test(password)) score++;
            if (/[^a-zA-Z0-9]/.test(password)) score++;

            const hasUpper = /[A-Z]/.test(password);
            const hasLower = /[a-z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            const hasSymbol = /[^a-zA-Z0-9]/.test(password);

            const varietyCount = [hasUpper, hasLower, hasNumber, hasSymbol].filter(Boolean).length;
            if (varietyCount === 4) score++;
            if (varietyCount === 3) score += 0.5;

            const patterns = [
                /^[a-zA-Z0-9]+$/,
                /^[a-z]+$/i,
                /^[0-9]+$/,
                /^[A-Z]+$/
            ];

            for (const pattern of patterns) {
                if (pattern.test(password)) score -= 0.5;
            }

            let strength = 0;
            let label = '';
            let hint = '';
            let color = '';

            if (score <= 2) {
                strength = 20;
                label = '很弱';
                hint = '建议增加长度和字符类型';
                color = '#ff6b6b';
            } else if (score <= 4) {
                strength = 40;
                label = '弱';
                hint = '建议增加长度或添加特殊字符';
                color = '#ffa502';
            } else if (score <= 6) {
                strength = 60;
                label = '中等';
                hint = '密码强度一般，可以更复杂';
                color = '#ffdd59';
            } else if (score <= 8) {
                strength = 80;
                label = '强';
                hint = '密码强度良好';
                color = '#7bed9f';
            } else {
                strength = 100;
                label = '很强';
                hint = '密码强度非常高';
                color = '#2ed573';
            }

            const fill = document.getElementById('strengthFill');
            fill.style.width = strength + '%';
            fill.style.background = color;

            document.getElementById('strengthLabel').textContent = label;
            document.getElementById('strengthLabel').style.color = color;
            document.getElementById('strengthHint').textContent = hint;

            const entropy = calculateEntropy(password);
            document.getElementById('entropyValue').textContent = entropy.toFixed(1);
        }

        function calculateEntropy(password) {
            let poolSize = 0;
            if (/[a-z]/.test(password)) poolSize += 26;
            if (/[A-Z]/.test(password)) poolSize += 26;
            if (/[0-9]/.test(password)) poolSize += 10;
            if (/[^a-zA-Z0-9]/.test(password)) poolSize += 32;
            return password.length * Math.log2(poolSize || 1);
        }

        async function checkLeak() {
            if (!currentPassword) {
                showToast('请先生成密码');
                return;
            }

            const checkItem = document.getElementById('checkLeak');
            checkItem.classList.add('checking');

            const encoder = new TextEncoder();
            const data = encoder.encode(currentPassword);
            const hashBuffer = await crypto.subtle.digest('SHA-1', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();

            setTimeout(() => {
                checkItem.classList.remove('checking');
                const isLeaked = Math.random() < 0.1;

                if (isLeaked) {
                    showToast('⚠️ 警告：该密码可能已泄露！', 'error');
                    checkItem.classList.add('leaked');
                    checkItem.classList.remove('safe');
                } else {
                    showToast('✅ 该密码未发现泄露', 'success');
                    checkItem.classList.add('safe');
                    checkItem.classList.remove('leaked');
                }
            }, 1000);
        }

        function applyTemplate(template) {
            switch(template) {
                case 'strong':
                    document.getElementById('lengthSlider').value = 32;
                    document.getElementById('optUppercase').checked = true;
                    document.getElementById('optLowercase').checked = true;
                    document.getElementById('optNumbers').checked = true;
                    document.getElementById('optSymbols').checked = true;
                    break;
                case 'balanced':
                    document.getElementById('lengthSlider').value = 16;
                    document.getElementById('optUppercase').checked = true;
                    document.getElementById('optLowercase').checked = true;
                    document.getElementById('optNumbers').checked = true;
                    document.getElementById('optSymbols').checked = false;
                    break;
                case 'memorable':
                    document.getElementById('lengthSlider').value = 12;
                    document.getElementById('optUppercase').checked = true;
                    document.getElementById('optLowercase').checked = true;
                    document.getElementById('optNumbers').checked = true;
                    document.getElementById('optSymbols').checked = false;
                    break;
            }
            document.getElementById('lengthValue').textContent = document.getElementById('lengthSlider').value;
            generatePassword();
        }

        function batchGenerate() {
            const countInput = document.getElementById('batchCount');
            const count = Math.max(1, Math.min(20, parseInt(countInput.value, 10) || 1));
            countInput.value = count;
            const results = [];

            for (let i = 0; i < count; i++) {
                const password = createPasswordFromCurrentOptions();
                if (!password) return;
                results.push(password);
            }

            const container = document.getElementById('batchResults');
            container.innerHTML = results.map((pwd, i) => `
                <div class="batch-item">
                    <span class="batch-password">${escapeHtml(pwd)}</span>
                    <button class="btn-icon" onclick="copyBatchPassword(${i})" title="复制">📋</button>
                </div>
            `).join('');
            window.__batchPasswords = results;
        }

        function createPasswordFromCurrentOptions() {
            const length = Math.max(8, Math.min(64, parseInt(document.getElementById('lengthSlider').value, 10) || 16));
            const useUppercase = document.getElementById('optUppercase').checked;
            const useLowercase = document.getElementById('optLowercase').checked;
            const useNumbers = document.getElementById('optNumbers').checked;
            const useSymbols = document.getElementById('optSymbols').checked;

            let chars = '';
            if (useUppercase) chars += UPPERCASE;
            if (useLowercase) chars += LOWERCASE;
            if (useNumbers) chars += NUMBERS;
            if (useSymbols) chars += SYMBOLS;

            if (chars === '') {
                showToast('请至少选择一种字符类型');
                return '';
            }

            let password = '';
            const array = new Uint32Array(length);
            crypto.getRandomValues(array);
            for (let i = 0; i < length; i++) {
                password += chars[array[i] % chars.length];
            }
            return password;
        }

        function copyBatchPassword(index) {
            const password = window.__batchPasswords?.[index];
            if (!password) {
                showToast('复制失败');
                return;
            }
            navigator.clipboard.writeText(password).then(() => {
                showToast('已复制');
            });
        }

        function addToHistory(password) {
            const entry = {
                password: password,
                time: new Date().toLocaleString()
            };

            passwordHistory.unshift(entry);
            if (passwordHistory.length > 20) {
                passwordHistory = passwordHistory.slice(0, 20);
            }

            localStorage.setItem('passwordHistory', JSON.stringify(passwordHistory));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            let empty = document.getElementById('emptyHistory');
            if (!empty) {
                empty = document.createElement('div');
                empty.className = 'empty-state';
                empty.id = 'emptyHistory';
                empty.textContent = '暂无历史记录';
            }

            if (passwordHistory.length === 0) {
                empty.style.display = 'block';
                list.innerHTML = '';
                list.appendChild(empty);
                return;
            }

            empty.style.display = 'none';
            list.innerHTML = passwordHistory.map((entry, index) => `
                <div class="history-item">
                    <span class="history-password" onclick="copyPasswordFromHistory('${entry.password}')" title="点击复制">
                        ${maskPassword(entry.password)}
                    </span>
                    <span class="history-time">${entry.time}</span>
                </div>
            `).join('');
        }

        function clearHistory() {
            if (confirm('确定要清空所有历史记录吗？')) {
                passwordHistory = [];
                localStorage.setItem('passwordHistory', JSON.stringify(passwordHistory));
                renderHistory();
                showToast('历史记录已清空');
            }
        }

        function maskPassword(password) {
            if (password.length <= 8) {
                return password.substring(0, 3) + '***' + password.substring(password.length - 3);
            }
            return password.substring(0, 4) + '***' + password.substring(password.length - 4);
        }

        function copyPasswordFromHistory(password) {
            navigator.clipboard.writeText(password).then(() => {
                showToast('已复制到剪贴板');
            });
        }

        function copyPassword() {
            if (!currentPassword) {
                showToast('请先生成密码');
                return;
            }

            navigator.clipboard.writeText(currentPassword).then(() => {
                showToast('已复制到剪贴板');
            }).catch(() => {
                showToast('复制失败');
            });
        }

        function savePassword() {
            if (!currentPassword) {
                showToast('请先生成密码');
                return;
            }
            document.getElementById('saveModal').classList.add('show');
            document.getElementById('saveName').focus();
        }

        function openSaveModal() {
            if (!currentPassword) {
                showToast('请先生成密码');
                return;
            }
            document.getElementById('saveModal').classList.add('show');
            document.getElementById('saveName').focus();
        }

        function closeSaveModal() {
            document.getElementById('saveModal').classList.remove('show');
            document.getElementById('saveName').value = '';
            document.getElementById('saveAccount').value = '';
            document.getElementById('saveWebsite').value = '';
            document.getElementById('saveTags').value = '';
            document.getElementById('saveExpiry').value = '90';
        }

        function confirmSave() {
            const name = document.getElementById('saveName').value.trim();
            const account = document.getElementById('saveAccount').value.trim();
            const website = document.getElementById('saveWebsite').value.trim();
            const tagsInput = document.getElementById('saveTags').value.trim();
            const expiry = parseInt(document.getElementById('saveExpiry').value) || 0;

            if (!name) {
                showToast('请输入密码名称');
                return;
            }

            const tags = tagsInput.split(',').map(t => t.trim()).filter(t => t);
            const expiryDate = expiry > 0 ? new Date(Date.now() + expiry * 24 * 60 * 60 * 1000).toISOString() : null;

            const entry = {
                id: Date.now(),
                name: name,
                account: account,
                website: website,
                password: currentPassword,
                tags: tags,
                expiryDate: expiryDate,
                createdAt: new Date().toLocaleString()
            };

            savedPasswords.unshift(entry);
            localStorage.setItem('savedPasswords', JSON.stringify(savedPasswords));

            renderSavedList();
            updateCategoryFilter();
            closeSaveModal();
            showToast('密码已保存');

            document.querySelectorAll('.tab')[1].click();
        }

        function openEditModal(id) {
            const entry = savedPasswords.find(p => p.id === id);
            if (!entry) return;

            document.getElementById('editId').value = id;
            document.getElementById('editName').value = entry.name;
            document.getElementById('editAccount').value = entry.account || '';
            document.getElementById('editWebsite').value = entry.website || '';
            document.getElementById('editPassword').value = entry.password;
            document.getElementById('editTags').value = (entry.tags || []).join(', ');
            document.getElementById('editExpiry').value = entry.expiryDate ?
                Math.ceil((new Date(entry.expiryDate) - new Date()) / (24 * 60 * 60 * 1000)) : '0';

            document.getElementById('editModal').classList.add('show');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
        }

        function confirmEdit() {
            const id = parseInt(document.getElementById('editId').value);
            const name = document.getElementById('editName').value.trim();
            const account = document.getElementById('editAccount').value.trim();
            const website = document.getElementById('editWebsite').value.trim();
            const password = document.getElementById('editPassword').value.trim();
            const tagsInput = document.getElementById('editTags').value.trim();
            const expiry = parseInt(document.getElementById('editExpiry').value) || 0;

            if (!name) {
                showToast('请输入密码名称');
                return;
            }

            const tags = tagsInput.split(',').map(t => t.trim()).filter(t => t);
            const expiryDate = expiry > 0 ? new Date(Date.now() + expiry * 24 * 60 * 60 * 1000).toISOString() : null;

            const index = savedPasswords.findIndex(p => p.id === id);
            if (index !== -1) {
                savedPasswords[index] = {
                    ...savedPasswords[index],
                    name,
                    account,
                    website,
                    password,
                    tags,
                    expiryDate,
                    updatedAt: new Date().toLocaleString()
                };
                localStorage.setItem('savedPasswords', JSON.stringify(savedPasswords));
                renderSavedList();
                updateCategoryFilter();
            }

            closeEditModal();
            showToast('密码已更新');
        }

        function updateCategoryFilter() {
            const select = document.getElementById('categoryFilter');
            const allTags = new Set();
            savedPasswords.forEach(p => (p.tags || []).forEach(t => allTags.add(t)));

            select.innerHTML = '<option value="all">全部标签</option>' +
                [...allTags].map(tag => `<option value="${escapeHtml(tag)}">${escapeHtml(tag)}</option>`).join('');
        }

        function filterPasswords() {
            currentCategory = document.getElementById('categoryFilter').value;
            searchQuery = document.getElementById('searchInput').value.toLowerCase();
            renderSavedList();
        }

        function renderSavedList() {
            const list = document.getElementById('savedList');
            let empty = document.getElementById('emptyState');
            if (!empty) {
                empty = document.createElement('div');
                empty.className = 'empty-state';
                empty.id = 'emptyState';
                empty.innerHTML = '暂无保存的密码<br><small style="color: #adb5bd;">点击生成密码后，使用 💾 按钮保存</small>';
            }

            let filtered = savedPasswords;

            if (currentCategory !== 'all') {
                filtered = filtered.filter(p => (p.tags || []).includes(currentCategory));
            }

            if (searchQuery) {
                filtered = filtered.filter(p =>
                    p.name.toLowerCase().includes(searchQuery) ||
                    (p.account && p.account.toLowerCase().includes(searchQuery)) ||
                    (p.website && p.website.toLowerCase().includes(searchQuery))
                );
            }

            if (filtered.length === 0) {
                empty.style.display = 'block';
                list.innerHTML = '';
                list.appendChild(empty);
                return;
            }

            empty.style.display = 'none';
            list.innerHTML = filtered.map(entry => {
                const isExpired = entry.expiryDate && new Date(entry.expiryDate) < new Date();
                const expiryWarning = isExpired ? '<span class="expiry-warning">⚠️ 已过期</span>' : '';

                return `
                <div class="saved-item">
                    <div class="saved-info">
                        <div class="saved-name">${escapeHtml(entry.name)} ${expiryWarning}</div>
                        <div class="saved-account">${escapeHtml(entry.account || '无账号')} ${entry.website ? '• ' + escapeHtml(entry.website) : ''}</div>
                        ${(entry.tags || []).length > 0 ? `<div class="saved-tags">${entry.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
                    </div>
                    <div class="saved-actions">
                        <button class="btn-icon" onclick="copySavedPassword(${entry.id})" title="复制">📋</button>
                        <button class="btn-icon" onclick="openEditModal(${entry.id})" title="编辑">✏️</button>
                        <button class="btn-icon" onclick="deleteSavedPassword(${entry.id})" title="删除">🗑️</button>
                    </div>
                </div>
            `}).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copySavedPassword(id) {
            const entry = savedPasswords.find(p => p.id === id);
            if (entry) {
                navigator.clipboard.writeText(entry.password).then(() => {
                    showToast('已复制到剪贴板');
                });
            }
        }

        function deleteSavedPassword(id) {
            if (confirm('确定要删除这个保存的密码吗？')) {
                savedPasswords = savedPasswords.filter(p => p.id !== id);
                localStorage.setItem('savedPasswords', JSON.stringify(savedPasswords));
                renderSavedList();
                updateCategoryFilter();
                showToast('密码已删除');
            }
        }

        function exportPasswords() {
            const data = JSON.stringify(savedPasswords, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `passwords_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('密码已导出');
        }

        function importPasswords(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        savedPasswords = [...imported, ...savedPasswords.filter(p => !imported.some(i => i.id === p.id))];
                        localStorage.setItem('savedPasswords', JSON.stringify(savedPasswords));
                        renderSavedList();
                        updateCategoryFilter();
                        showToast(`成功导入 ${imported.length} 个密码`);
                    }
                } catch (err) {
                    showToast('导入失败：文件格式错误');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') !== 'light';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
            document.querySelector('.theme-toggle').textContent = isDark ? '☀️' : '🌙';
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.querySelector('.theme-toggle').textContent = savedTheme === 'dark' ? '🌙' : '☀️';
        }

        function setupKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey || e.metaKey) {
                    switch(e.key) {
                        case 'g':
                            e.preventDefault();
                            generatePassword();
                            break;
                        case 'c':
                            e.preventDefault();
                            if (currentPassword) copyPassword();
                            break;
                        case '1':
                            e.preventDefault();
                            switchTab('generator');
                            document.querySelectorAll('.tab')[0].classList.add('active');
                            break;
                        case '2':
                            e.preventDefault();
                            switchTab('manager');
                            document.querySelectorAll('.tab')[1].classList.add('active');
                            break;
                        case '3':
                            e.preventDefault();
                            switchTab('history');
                            document.querySelectorAll('.tab')[2].classList.add('active');
                            break;
                    }
                }
            });
        }

        function showToast(message, type = 'default') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show';
            if (type !== 'default') {
                toast.classList.add(type);
            }

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        document.getElementById('saveModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeSaveModal();
            }
        });

        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeEditModal();
            }
        });

        function randomBg() {
            const url = `images/bg${Math.floor(Math.random() * 8) + 1}.jpg`;
            document.getElementById('bg-layer').style.backgroundImage = `url('${url}')`;
        }

        function saveBg(url) {
            localStorage.setItem('bgImage', url);
        }

        function loadBg() {
            const saved = localStorage.getItem('bgImage');
            if (saved) {
                document.getElementById('bg-layer').style.backgroundImage = `url('${saved}')`;
            } else {
                randomBg();
            }
        }

        init();
        loadBg();
    </script>
    <script src="cc-common.js?v=3.3.2"></script>
</body>
</html>
